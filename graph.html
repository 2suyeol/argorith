<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알고리즘 시각화 — 그래프 탐색</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  :root{
    --paper:#F7F3EC;
    --paper-deep:#EFE9DD;
    --ink:#1F3A2E;
    --ink-soft:#3F5A4C;
    --line:#D9D2C2;
    --compare:#D98E48;
    --swap:#B5483A;
    --done:#5B8C6E;
    --frontier:#C9A876;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Pretendard', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    padding:48px 24px 96px;
  }
  header{
    margin-bottom:0;
    border-bottom:1px solid var(--line);
    padding-bottom:24px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--ink-soft);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow a{
    color:var(--ink-soft);
    text-decoration:none;
    border-bottom:1px dashed var(--line);
  }
  .eyebrow a:hover{ color:var(--ink); }
  h1{
    font-size:28px;
    font-weight:700;
    margin:8px 0 0;
    letter-spacing:-0.01em;
  }
  .algo-tabs{
    display:flex;
    gap:6px;
    margin-top:24px;
    flex-wrap:wrap;
  }
  .algo-tab{
    font-family:var(--mono);
    font-size:13px;
    padding:8px 14px;
    border:1px solid var(--line);
    border-radius:7px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
  }
  .algo-tab:hover{ border-color:var(--ink-soft); }
  .algo-tab.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .explain-box{
    margin-top:20px;
    padding:18px 22px;
    background:transparent;
    border:1px solid var(--line);
    border-radius:12px;
  }
  .explain-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .explain-title{
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    letter-spacing:0.02em;
  }
  .explain-toggle{
    display:flex;
    gap:4px;
    background:var(--paper-deep);
    border-radius:7px;
    padding:3px;
  }
  .explain-toggle-btn{
    font-family:var(--mono);
    font-size:11px;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .explain-toggle-btn.active{
    background:var(--ink);
    color:var(--paper);
  }
  .explain-body{
    margin:14px 0 0;
    font-size:14px;
    line-height:1.65;
    color:var(--ink-soft);
  }
  .explain-meta{
    list-style:none;
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    margin:14px 0 0;
    padding:12px 0 0;
    border-top:1px dashed var(--line);
  }
  .explain-meta li{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .explain-meta li b{
    display:block;
    color:var(--ink);
    font-size:13px;
    margin-top:2px;
  }
  .explain-meta:empty{ display:none; border-top:none; margin-top:0; padding-top:0; }

  .stage{
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-radius:14px;
    padding:24px 24px 28px;
    margin-top:28px;
  }

  .graph-area{
    position:relative;
    width:100%;
    height:380px;
  }
  .graph-area canvas{
    width:100%;
    height:100%;
    display:block;
  }

  /* 다익스트라용 거리 패널 */
  .dist-panel{
    margin-top:18px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .dist-chip{
    font-family:var(--mono);
    font-size:12px;
    padding:6px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    color:var(--ink-soft);
    background:var(--paper);
  }
  .dist-chip b{ color:var(--ink); margin-left:4px; }
  .dist-chip.updated{ border-color:var(--compare); color:var(--ink); }
  .dist-chip.final{ border-color:var(--done); }

  /* 큐/스택 패널 */
  .queue-panel{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .queue-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .queue-items{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .queue-chip{
    font-family:var(--mono);
    font-size:12px;
    padding:5px 10px;
    border-radius:6px;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink-soft);
  }
  .queue-chip.head{
    background:var(--compare);
    color:var(--paper);
    border-color:var(--compare);
  }

  .narration{
    margin-top:16px;
    font-size:14px;
    color:var(--ink-soft);
    min-height:20px;
  }
  .narration b{ color:var(--ink); }

  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:20px;
    flex-wrap:wrap;
  }
  .btn{
    font-family:var(--mono);
    font-size:13px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn.ghost{
    background:transparent;
    color:var(--ink);
  }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn:focus-visible, .algo-tab:focus-visible, input:focus-visible{
    outline:2px solid var(--swap);
    outline-offset:2px;
  }

  .scrub{
    flex:1;
    min-width:160px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .scrub input[type=range]{
    flex:1;
    accent-color:var(--ink);
  }
  .step-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }

  .speed{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .speed input[type=range]{ width:90px; accent-color:var(--ink-soft); }

  .meta-row{
    display:flex;
    gap:24px;
    margin-top:20px;
    flex-wrap:wrap;
  }
  .meta{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .meta b{
    color:var(--ink);
    font-size:14px;
    display:block;
    margin-top:2px;
  }

  .regen-row{
    display:flex;
    gap:10px;
    margin-top:24px;
    align-items:center;
    flex-wrap:wrap;
  }
  .regen-row label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .regen-row input[type=number]{
    width:64px;
    font-family:var(--mono);
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  @media (max-width:600px){
    .graph-area{ height:300px; }
    h1{ font-size:22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Algorithm Visualizer — Stage 2 · <a href="./index.html">정렬 보러가기 →</a></div>
    <h1>그래프 탐색 알고리즘 시각화</h1>
    <div class="algo-tabs" role="tablist" aria-label="그래프 알고리즘 선택">
      <button class="algo-tab active" data-algo="bfs">BFS (너비 우선 탐색)</button>
      <button class="algo-tab" data-algo="dfs">DFS (깊이 우선 탐색)</button>
      <button class="algo-tab" data-algo="dijkstra">다익스트라</button>
    </div>
  </header>

  <div class="explain-box">
    <div class="explain-head">
      <span class="explain-title" id="explainTitle">BFS</span>
      <div class="explain-toggle" role="tablist" aria-label="설명 분량 선택">
        <button class="explain-toggle-btn active" data-mode="simple">간단히</button>
        <button class="explain-toggle-btn" data-mode="detail">자세히</button>
      </div>
    </div>
    <p class="explain-body" id="explainBody"></p>
    <ul class="explain-meta" id="explainMeta"></ul>
  </div>

  <div class="stage">
    <div class="graph-area">
      <canvas id="graphCanvas"></canvas>
    </div>

    <div class="queue-panel" id="queuePanel" style="display:none;">
      <span class="queue-label" id="queueLabel">큐</span>
      <div class="queue-items" id="queueItems"></div>
    </div>

    <div class="dist-panel" id="distPanel" style="display:none;"></div>

    <div class="narration" id="narration">재생을 눌러 시작하세요.</div>

    <div class="controls">
      <button class="btn ghost" id="btnReset" title="처음으로">⏮ 처음</button>
      <button class="btn ghost" id="btnPrev" title="이전 스텝">◀ 이전</button>
      <button class="btn" id="btnPlay" title="재생/일시정지">▶ 재생</button>
      <button class="btn ghost" id="btnNext" title="다음 스텝">다음 ▶</button>

      <div class="scrub">
        <input type="range" id="scrub" min="0" max="0" value="0">
        <span class="step-label" id="stepLabel">0 / 0</span>
      </div>

      <div class="speed">
        속도
        <input type="range" id="speed" min="1" max="10" value="5">
      </div>
    </div>

    <div class="meta-row">
      <div class="meta">방문한 노드<b id="metaVisited">0</b></div>
      <div class="meta">탐색한 엣지<b id="metaEdges">0</b></div>
      <div class="meta" id="metaComplexityWrap">시간복잡도<b id="metaComplexity">—</b></div>
    </div>

    <div class="regen-row">
      <label for="nodeInput">노드 개수</label>
      <input type="number" id="nodeInput" min="5" max="14" value="9">
      <button class="btn ghost" id="btnShuffle">🔀 새 그래프</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- 상태 ----------
  let nodes = [];      // [{id, x, y}]
  let edges = [];      // [{a, b, weight}]
  let adj = [];         // adjacency list: adj[id] = [{to, weight}]
  let steps = [];
  let cur = 0;
  let playing = false;
  let timer = null;
  let currentAlgo = "bfs";
  let explainMode = "simple";
  let startNode = 0;

  const canvas = document.getElementById("graphCanvas");
  const ctx = canvas.getContext("2d");

  // ---------- DOM ----------
  const narrationEl = document.getElementById("narration");
  const scrubEl = document.getElementById("scrub");
  const stepLabelEl = document.getElementById("stepLabel");
  const speedEl = document.getElementById("speed");
  const metaVisitedEl = document.getElementById("metaVisited");
  const metaEdgesEl = document.getElementById("metaEdges");
  const metaComplexityEl = document.getElementById("metaComplexity");
  const metaComplexityWrap = document.getElementById("metaComplexityWrap");
  const nodeInputEl = document.getElementById("nodeInput");
  const queuePanelEl = document.getElementById("queuePanel");
  const queueLabelEl = document.getElementById("queueLabel");
  const queueItemsEl = document.getElementById("queueItems");
  const distPanelEl = document.getElementById("distPanel");
  const explainTitleEl = document.getElementById("explainTitle");
  const explainBodyEl = document.getElementById("explainBody");
  const explainMetaEl = document.getElementById("explainMeta");

  const btnPlay = document.getElementById("btnPlay");
  const btnPrev = document.getElementById("btnPrev");
  const btnNext = document.getElementById("btnNext");
  const btnReset = document.getElementById("btnReset");
  const btnShuffle = document.getElementById("btnShuffle");

  // ---------- 설명 데이터 ----------
  const explainData = {
    bfs: {
      title: "BFS (너비 우선 탐색, Breadth-First Search)",
      simple: "시작 노드에서 가까운 노드부터 한 단계씩 넓게 퍼져나가며 탐색해요. 큐(Queue)를 사용해 먼저 발견한 노드를 먼저 방문합니다.",
      detail: "시작 노드를 큐에 넣고, 큐에서 하나씩 꺼내며 아직 방문하지 않은 이웃 노드를 모두 큐에 추가합니다. 먼저 들어온 노드를 먼저 꺼내는 FIFO 구조 덕분에, 같은 거리(단계)에 있는 노드들을 모두 방문한 뒤에야 다음 단계로 넘어갑니다. 이 특성 때문에 '가중치 없는 그래프에서의 최단 경로'를 찾을 때 사용됩니다.",
      time: "O(V + E)",
      space: "O(V)",
      structure: "큐 (Queue, FIFO)",
      trait: "가중치 없는 그래프의 최단 경로 탐색에 적합"
    },
    dfs: {
      title: "DFS (깊이 우선 탐색, Depth-First Search)",
      simple: "한 방향으로 갈 수 있는 만큼 끝까지 깊이 들어갔다가, 더 갈 곳이 없으면 되돌아와 다른 길을 탐색해요. 스택(Stack)이나 재귀로 구현합니다.",
      detail: "시작 노드에서 출발해 방문하지 않은 이웃 하나를 골라 그 노드로 이동하고, 다시 그 노드의 이웃을 탐색하는 방식으로 한 경로를 끝까지 파고듭니다. 더 이상 갈 곳이 없으면 이전 노드로 되돌아가(백트래킹) 다른 경로를 시도합니다. 재귀 호출 또는 스택(LIFO)으로 구현되며, 그래프의 연결 요소 확인이나 사이클 탐지, 위상 정렬의 기반이 됩니다.",
      time: "O(V + E)",
      space: "O(V)",
      structure: "스택 (Stack, LIFO) 또는 재귀",
      trait: "경로 탐색·사이클 탐지·위상 정렬의 기초"
    },
    dijkstra: {
      title: "다익스트라 (Dijkstra's Algorithm)",
      simple: "가중치가 있는 그래프에서, 시작 노드로부터 각 노드까지의 '가장 짧은 거리'를 찾아요. 항상 지금까지 발견한 거리 중 가장 짧은 노드를 먼저 확정합니다.",
      detail: "시작 노드의 거리를 0으로, 나머지는 무한대로 초기화한 뒤, 아직 확정되지 않은 노드 중 거리가 가장 짧은 노드를 선택해 확정합니다. 확정된 노드를 거쳐 이웃 노드로 가는 거리가 기존에 기록된 거리보다 짧다면 갱신(완화, relaxation)합니다. 이 과정을 모든 노드가 확정될 때까지 반복하며, 음수 가중치가 없는 그래프에서 항상 정확한 최단 거리를 보장합니다.",
      time: "O((V+E) log V) (우선순위 큐 사용 시)",
      space: "O(V)",
      structure: "우선순위 큐 (Priority Queue)",
      trait: "음수 가중치가 없는 가중 그래프의 최단 경로"
    }
  };

  // ---------- 그래프 생성 ----------
  function genGraph(n){
    const newNodes = [];
    const cx = 0.5, cy = 0.5, r = 0.38;
    for(let i=0;i<n;i++){
      const angle = (Math.PI*2*i/n) - Math.PI/2;
      newNodes.push({ id:i, x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle) });
    }

    // 연결된 그래프를 보장: 먼저 랜덤 스패닝 트리를 만들고, 추가 엣지를 덧붙임
    const newEdges = [];
    const edgeSet = new Set();
    function addEdge(a,b){
      const key = a<b ? a+"_"+b : b+"_"+a;
      if(edgeSet.has(key) || a===b) return false;
      edgeSet.add(key);
      newEdges.push({a, b, weight: Math.floor(Math.random()*9)+1});
      return true;
    }

    const visited = new Set([0]);
    const remaining = Array.from({length:n-1}, (_,i)=>i+1);
    // 셔플
    for(let i=remaining.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }
    remaining.forEach(node => {
      const visitedArr = Array.from(visited);
      const parent = visitedArr[Math.floor(Math.random()*visitedArr.length)];
      addEdge(parent, node);
      visited.add(node);
    });

    // 추가 엣지로 그래프를 좀 더 풍성하게 (노드당 평균 1~2개 더)
    const extra = Math.max(1, Math.floor(n*0.6));
    let attempts = 0;
    let added = 0;
    while(added < extra && attempts < extra*10){
      attempts++;
      const a = Math.floor(Math.random()*n);
      const b = Math.floor(Math.random()*n);
      if(addEdge(a,b)) added++;
    }

    const newAdj = Array.from({length:n}, ()=>[]);
    newEdges.forEach(e => {
      newAdj[e.a].push({to:e.b, weight:e.weight});
      newAdj[e.b].push({to:e.a, weight:e.weight});
    });

    return { nodes:newNodes, edges:newEdges, adj:newAdj };
  }

  // ---------- 스텝 빌더 ----------
  function buildSteps(algo, start){
    const log = [];
    let visitedCount = 0, edgeCount = 0;

    function snapshot(extra){
      log.push(Object.assign({
        visitedSet:[], currentNode:null, frontierSet:[], finalSet:[],
        queue:[], dist:null, note:"", visitedCount, edgeCount
      }, extra || {}));
    }

    if(algo === "bfs"){
      const visited = new Set([start]);
      const queue = [start];
      snapshot({ visitedSet:[start], queue:queue.slice(), note:`시작 노드 ${start}를 큐에 추가` });
      while(queue.length){
        const node = queue.shift();
        visitedCount++;
        snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:queue.slice(), visitedCount, note:`노드 ${node} 방문 (큐에서 꺼냄)` });
        const neighbors = adj[node].map(e=>e.to).sort((a,b)=>a-b);
        for(const next of neighbors){
          edgeCount++;
          if(!visited.has(next)){
            visited.add(next);
            queue.push(next);
            snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:queue.slice(), edgeCount, note:`이웃 ${next} 발견 → 큐에 추가` });
          } else {
            snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:queue.slice(), edgeCount, note:`이웃 ${next}는 이미 방문함` });
          }
        }
      }
      snapshot({ visitedSet:Array.from(visited), queue:[], visitedCount, edgeCount, note:"탐색 완료" });
    }

    else if(algo === "dfs"){
      const visited = new Set();
      const stack = [start];
      snapshot({ visitedSet:[], queue:stack.slice(), note:`시작 노드 ${start}를 스택에 추가` });
      while(stack.length){
        const node = stack.pop();
        if(visited.has(node)){
          snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:stack.slice(), note:`노드 ${node}는 이미 방문 → 스킵` });
          continue;
        }
        visited.add(node);
        visitedCount++;
        snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:stack.slice(), visitedCount, note:`노드 ${node} 방문 (스택에서 꺼냄)` });
        const neighbors = adj[node].map(e=>e.to).sort((a,b)=>b-a); // 역순으로 push해야 작은 번호부터 pop됨
        for(const next of neighbors){
          edgeCount++;
          if(!visited.has(next)){
            stack.push(next);
            snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:stack.slice(), edgeCount, note:`이웃 ${next}를 스택에 추가` });
          }
        }
      }
      snapshot({ visitedSet:Array.from(visited), queue:[], visitedCount, edgeCount, note:"탐색 완료" });
    }

    else if(algo === "dijkstra"){
      const n = nodes.length;
      const dist = Array(n).fill(Infinity);
      dist[start] = 0;
      const finalized = new Set();
      snapshot({ dist:dist.slice(), finalSet:[], note:`시작 노드 ${start}의 거리를 0으로 초기화` });

      while(finalized.size < n){
        let u = -1, best = Infinity;
        for(let i=0;i<n;i++){
          if(!finalized.has(i) && dist[i] < best){ best = dist[i]; u = i; }
        }
        if(u === -1) break; // 연결 안 된 나머지 노드
        finalized.add(u);
        visitedCount++;
        snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), currentNode:u, visitedCount, note:`거리가 가장 짧은 노드 ${u}(거리 ${dist[u]}) 확정` });

        const neighbors = adj[u].slice().sort((a,b)=>a.to-b.to);
        for(const {to, weight} of neighbors){
          edgeCount++;
          if(finalized.has(to)) continue;
          const newDist = dist[u] + weight;
          if(newDist < dist[to]){
            const old = dist[to];
            dist[to] = newDist;
            snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), currentNode:u, edgeCount, note:`${u}→${to} 경로로 거리 갱신: ${old===Infinity?"∞":old} → ${newDist}` });
          } else {
            snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), currentNode:u, edgeCount, note:`${u}→${to}: 기존 거리(${dist[to]})가 더 짧아 갱신 안 함` });
          }
        }
      }
      snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), visitedCount, edgeCount, note:"모든 노드의 최단 거리 확정 완료" });
    }

    return log;
  }

  // ---------- 캔버스 렌더링 ----------
  function resizeCanvas(){
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    drawGraph(steps[cur] || {});
  }

  function nodeColor(id, step){
    if(currentAlgo === "dijkstra"){
      if(step.finalSet && step.finalSet.includes(id)) return getCss("--done");
      if(step.currentNode === id) return getCss("--compare");
      if(step.dist && step.dist[id] !== Infinity) return getCss("--frontier");
      return getCss("--ink-soft");
    }
    if(step.currentNode === id) return getCss("--compare");
    if(step.visitedSet && step.visitedSet.includes(id)) return getCss("--done");
    if(step.queue && step.queue.includes(id)) return getCss("--frontier");
    return getCss("--ink-soft");
  }

  let cssCache = {};
  function getCss(varName){
    if(cssCache[varName]) return cssCache[varName];
    const val = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    cssCache[varName] = val;
    return val;
  }

  function drawGraph(step){
    const rect = canvas.parentElement.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    ctx.clearRect(0,0,W,H);

    const pad = 50;
    const toPx = (n) => ({ x: pad + n.x*(W-2*pad), y: pad + n.y*(H-2*pad) });

    // 엣지
    edges.forEach(e => {
      const pa = toPx(nodes[e.a]);
      const pb = toPx(nodes[e.b]);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = getCss("--line");
      ctx.lineWidth = 1.5;
      ctx.stroke();

      if(currentAlgo === "dijkstra"){
        const mx = (pa.x+pb.x)/2, my = (pa.y+pb.y)/2;
        ctx.font = "11px 'IBM Plex Mono', monospace";
        ctx.fillStyle = getCss("--ink-soft");
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        // 작은 배경
        const txt = String(e.weight);
        const tw = ctx.measureText(txt).width;
        ctx.fillStyle = getCss("--paper-deep");
        ctx.fillRect(mx-tw/2-3, my-8, tw+6, 16);
        ctx.fillStyle = getCss("--ink-soft");
        ctx.fillText(txt, mx, my);
      }
    });

    // 노드
    const R = 18;
    nodes.forEach(n => {
      const p = toPx(n);
      ctx.beginPath();
      ctx.arc(p.x, p.y, R, 0, Math.PI*2);
      ctx.fillStyle = nodeColor(n.id, step);
      ctx.fill();

      if(step.currentNode === n.id){
        ctx.lineWidth = 3;
        ctx.strokeStyle = getCss("--ink");
        ctx.stroke();
      }

      ctx.fillStyle = getCss("--paper");
      ctx.font = "600 13px 'IBM Plex Mono', monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(n.id, p.x, p.y);

      if(currentAlgo === "dijkstra" && step.dist){
        const d = step.dist[n.id];
        const label = d === Infinity ? "∞" : String(d);
        ctx.font = "600 11px 'IBM Plex Mono', monospace";
        ctx.fillStyle = getCss("--ink");
        ctx.fillText(label, p.x, p.y - R - 12);
      }
    });
  }

  // ---------- 패널 렌더링 ----------
  function renderQueuePanel(step){
    if(currentAlgo === "dijkstra"){
      queuePanelEl.style.display = "none";
      return;
    }
    queuePanelEl.style.display = "flex";
    queueLabelEl.textContent = currentAlgo === "bfs" ? "큐 (앞→뒤)" : "스택 (위→아래)";
    queueItemsEl.innerHTML = "";
    const list = step.queue || [];
    list.forEach((id, idx) => {
      const chip = document.createElement("span");
      chip.className = "queue-chip" + (idx===0 ? " head" : "");
      chip.textContent = id;
      queueItemsEl.appendChild(chip);
    });
    if(list.length === 0){
      const chip = document.createElement("span");
      chip.className = "queue-chip";
      chip.textContent = "비어있음";
      queueItemsEl.appendChild(chip);
    }
  }

  function renderDistPanel(step){
    if(currentAlgo !== "dijkstra"){
      distPanelEl.style.display = "none";
      return;
    }
    distPanelEl.style.display = "flex";
    distPanelEl.innerHTML = "";
    if(!step.dist) return;
    step.dist.forEach((d, id) => {
      const chip = document.createElement("span");
      let cls = "dist-chip";
      if(step.finalSet && step.finalSet.includes(id)) cls += " final";
      else if(step.currentNode === id) cls += " updated";
      chip.className = cls;
      chip.innerHTML = `노드${id}<b>${d===Infinity?"∞":d}</b>`;
      distPanelEl.appendChild(chip);
    });
  }

  function renderExplain(algo){
    const data = explainData[algo];
    if(!data) return;
    explainTitleEl.textContent = data.title;
    explainBodyEl.textContent = explainMode === "simple" ? data.simple : data.detail;
    if(explainMode === "detail"){
      explainMetaEl.innerHTML = `
        <li>시간복잡도<b>${data.time}</b></li>
        <li>공간복잡도<b>${data.space}</b></li>
        <li>자료구조<b>${data.structure}</b></li>
        <li>특징<b>${data.trait}</b></li>
      `;
    } else {
      explainMetaEl.innerHTML = "";
    }
  }

  // ---------- 스텝 적용 ----------
  function applyStep(step){
    drawGraph(step);
    renderQueuePanel(step);
    renderDistPanel(step);

    narrationEl.innerHTML = step.note ? `<b>${cur+1}.</b> ${step.note}` : "";
    metaVisitedEl.textContent = step.visitedCount;
    metaEdgesEl.textContent = step.edgeCount;

    scrubEl.value = cur;
    stepLabelEl.textContent = `${cur+1} / ${steps.length}`;
    btnPrev.disabled = cur<=0;
    btnNext.disabled = cur>=steps.length-1;
  }

  function goTo(idx){
    cur = Math.max(0, Math.min(steps.length-1, idx));
    applyStep(steps[cur]);
    if(cur>=steps.length-1) stopPlay();
  }

  function stepForward(){
    if(cur < steps.length-1) goTo(cur+1);
    else stopPlay();
  }

  function startPlay(){
    if(steps.length===0 || cur>=steps.length-1) return;
    playing = true;
    btnPlay.textContent = "⏸ 일시정지";
    const tick = () => {
      stepForward();
      if(playing && cur<steps.length-1){
        const speedVal = Number(speedEl.value);
        const delay = 700 - speedVal*55;
        timer = setTimeout(tick, Math.max(50, delay));
      } else {
        stopPlay();
      }
    };
    tick();
  }

  function stopPlay(){
    playing = false;
    btnPlay.textContent = "▶ 재생";
    if(timer) clearTimeout(timer);
  }

  const complexityLabel = {
    bfs: "O(V + E)",
    dfs: "O(V + E)",
    dijkstra: "O((V+E) log V)"
  };

  function rebuild(algo){
    currentAlgo = algo;
    stopPlay();
    steps = buildSteps(algo, startNode);
    cur = 0;
    scrubEl.max = steps.length-1;
    metaComplexityEl.textContent = complexityLabel[algo] || "—";
    applyStep(steps[0]);
    renderExplain(algo);
  }

  function newGraph(){
    const n = Math.max(5, Math.min(14, Number(nodeInputEl.value) || 9));
    const g = genGraph(n);
    nodes = g.nodes; edges = g.edges; adj = g.adj;
    startNode = 0;
    rebuild(currentAlgo);
  }

  // ---------- 이벤트 ----------
  document.querySelectorAll(".algo-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".algo-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      rebuild(tab.dataset.algo);
    });
  });

  document.querySelectorAll(".explain-toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".explain-toggle-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      explainMode = btn.dataset.mode;
      renderExplain(currentAlgo);
    });
  });

  btnPlay.addEventListener("click", () => playing ? stopPlay() : startPlay());
  btnPrev.addEventListener("click", () => { stopPlay(); goTo(cur-1); });
  btnNext.addEventListener("click", () => { stopPlay(); goTo(cur+1); });
  btnReset.addEventListener("click", () => { stopPlay(); goTo(0); });
  btnShuffle.addEventListener("click", newGraph);
  scrubEl.addEventListener("input", (e) => { stopPlay(); goTo(Number(e.target.value)); });

  canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left);
    const y = (e.clientY - rect.top);
    const pad = 50;
    const W = rect.width, H = rect.height;
    let clickedId = null;
    nodes.forEach(n => {
      const px = pad + n.x*(W-2*pad);
      const py = pad + n.y*(H-2*pad);
      if(Math.hypot(px-x, py-y) <= 18){ clickedId = n.id; }
    });
    if(clickedId !== null && clickedId !== startNode){
      startNode = clickedId;
      rebuild(currentAlgo);
    }
  });

  document.addEventListener("keydown", (e) => {
    if(e.target.tagName === "INPUT") return;
    if(e.code === "Space"){ e.preventDefault(); playing ? stopPlay() : startPlay(); }
    if(e.code === "ArrowRight"){ stopPlay(); goTo(cur+1); }
    if(e.code === "ArrowLeft"){ stopPlay(); goTo(cur-1); }
  });

  window.addEventListener("resize", resizeCanvas);

  // ---------- 초기화 ----------
  const initial = genGraph(9);
  nodes = initial.nodes; edges = initial.edges; adj = initial.adj;
  rebuild("bfs");
  resizeCanvas();
})();
</script>
</body>
</html>
