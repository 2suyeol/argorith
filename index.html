<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알고리즘 시각화 — 정렬</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  :root{
    --paper:#F7F3EC;
    --paper-deep:#EFE9DD;
    --ink:#1F3A2E;
    --ink-soft:#3F5A4C;
    --line:#D9D2C2;
    --compare:#D98E48;
    --swap:#B5483A;
    --done:#5B8C6E;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Pretendard', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    padding:48px 24px 96px;
  }
  header{
    margin-bottom:36px;
    border-bottom:1px solid var(--line);
    padding-bottom:24px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--ink-soft);
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow a{
    color:var(--ink-soft);
    text-decoration:none;
    border-bottom:1px dashed var(--line);
    text-transform:none;
    letter-spacing:0;
  }
  .eyebrow a:hover{ color:var(--ink); }
  h1{
    font-size:28px;
    font-weight:700;
    margin:8px 0 0;
    letter-spacing:-0.01em;
  }
  .algo-tabs{
    display:flex;
    gap:6px;
    margin-top:24px;
    flex-wrap:wrap;
  }
  .algo-tab{
    font-family:var(--mono);
    font-size:13px;
    padding:8px 14px;
    border:1px solid var(--line);
    border-radius:7px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
  }
  .algo-tab:hover{ border-color:var(--ink-soft); }
  .algo-tab.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .explain-box{
    margin-top:20px;
    padding:18px 22px;
    background:transparent;
    border:1px solid var(--line);
    border-radius:12px;
  }
  .explain-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .explain-title{
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    letter-spacing:0.02em;
  }
  .explain-toggle{
    display:flex;
    gap:4px;
    background:var(--paper-deep);
    border-radius:7px;
    padding:3px;
  }
  .explain-toggle-btn{
    font-family:var(--mono);
    font-size:11px;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .explain-toggle-btn.active{
    background:var(--ink);
    color:var(--paper);
  }
  .explain-body{
    margin:14px 0 0;
    font-size:14px;
    line-height:1.65;
    color:var(--ink-soft);
  }
  .explain-meta{
    list-style:none;
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    margin:14px 0 0;
    padding:12px 0 0;
    border-top:1px dashed var(--line);
  }
  .explain-meta li{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .explain-meta li b{
    display:block;
    color:var(--ink);
    font-size:13px;
    margin-top:2px;
  }
  .explain-meta:empty{ display:none; border-top:none; margin-top:0; padding-top:0; }

  .stage{
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px 28px 28px;
    margin-top:28px;
  }

  .bars{
    position:relative;
    height:280px;
    display:flex;
    align-items:flex-end;
    gap:6px;
    padding:0 4px;
  }
  .bar{
    flex:1;
    height:100%;
    position:relative;
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    transition:transform .25s ease;
  }
  .bar-fill{
    width:100%;
    flex-shrink:0;
    background:var(--ink-soft);
    border-radius:4px 4px 2px 2px;
    transition:height .28s cubic-bezier(.4,0,.2,1), background .15s ease;
  }
  .bar.compare .bar-fill{ background:var(--compare); }
  .bar.swap .bar-fill{ background:var(--swap); }
  .bar.done .bar-fill{ background:var(--done); }
  .bar-val{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .bar.compare .bar-val, .bar.swap .bar-val{ color:var(--ink); font-weight:600; }

  .arc-layer{
    position:absolute;
    top:-26px; left:0; right:0; height:24px;
    pointer-events:none;
  }
  .arc{
    position:absolute;
    height:18px;
    border-top:2px solid var(--compare);
    border-radius:50%;
    opacity:0;
    transition:opacity .2s ease;
  }
  .arc.show{ opacity:1; }

  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:28px;
    flex-wrap:wrap;
  }
  .btn{
    font-family:var(--mono);
    font-size:13px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn.ghost{
    background:transparent;
    color:var(--ink);
  }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn:focus-visible, .algo-tab:focus-visible, input:focus-visible{
    outline:2px solid var(--swap);
    outline-offset:2px;
  }

  .scrub{
    flex:1;
    min-width:160px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .scrub input[type=range]{
    flex:1;
    accent-color:var(--ink);
  }
  .step-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }

  .speed{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .speed input[type=range]{ width:90px; accent-color:var(--ink-soft); }

  .meta-row{
    display:flex;
    gap:24px;
    margin-top:20px;
    flex-wrap:wrap;
  }
  .meta{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .meta b{
    color:var(--ink);
    font-size:14px;
    display:block;
    margin-top:2px;
  }

  .narration{
    margin-top:16px;
    font-size:14px;
    color:var(--ink-soft);
    min-height:20px;
  }
  .narration b{ color:var(--ink); }

  .regen-row{
    display:flex;
    gap:10px;
    margin-top:24px;
    align-items:center;
    flex-wrap:wrap;
  }
  .regen-row label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .regen-row input[type=number]{
    width:64px;
    font-family:var(--mono);
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
  }

  @media (prefers-reduced-motion: reduce){
    .bar-fill, .bar{ transition:none !important; }
  }

  @media (max-width:600px){
    .bars{ height:200px; gap:3px; }
    .bar-val{ font-size:9px; }
    h1{ font-size:22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Algorithm Visualizer — Stage 1 · <a href="./graph.html">그래프 탐색 보러가기 →</a></div>
    <h1>정렬 알고리즘 시각화</h1>
    <div class="algo-tabs" role="tablist" aria-label="정렬 알고리즘 선택">
      <button class="algo-tab active" data-algo="bubble">버블 정렬</button>
      <button class="algo-tab" data-algo="selection">선택 정렬</button>
      <button class="algo-tab" data-algo="insertion">삽입 정렬</button>
      <button class="algo-tab" data-algo="quick">퀵 정렬</button>
      <button class="algo-tab" data-algo="merge">병합 정렬</button>
    </div>
  </header>

  <div class="explain-box">
    <div class="explain-head">
      <span class="explain-title" id="explainTitle">버블 정렬</span>
      <div class="explain-toggle" role="tablist" aria-label="설명 분량 선택">
        <button class="explain-toggle-btn active" data-mode="simple">간단히</button>
        <button class="explain-toggle-btn" data-mode="detail">자세히</button>
      </div>
    </div>
    <p class="explain-body" id="explainBody"></p>
    <ul class="explain-meta" id="explainMeta"></ul>
  </div>

  <div class="stage">
    <div class="bars" id="bars"></div>

    <div class="narration" id="narration">재생을 눌러 시작하세요.</div>

    <div class="controls">
      <button class="btn ghost" id="btnReset" title="처음으로">⏮ 처음</button>
      <button class="btn ghost" id="btnPrev" title="이전 스텝">◀ 이전</button>
      <button class="btn" id="btnPlay" title="재생/일시정지">▶ 재생</button>
      <button class="btn ghost" id="btnNext" title="다음 스텝">다음 ▶</button>

      <div class="scrub">
        <input type="range" id="scrub" min="0" max="0" value="0">
        <span class="step-label" id="stepLabel">0 / 0</span>
      </div>

      <div class="speed">
        속도
        <input type="range" id="speed" min="1" max="10" value="5">
      </div>
    </div>

    <div class="meta-row">
      <div class="meta">비교 횟수<b id="metaCompare">0</b></div>
      <div class="meta">교환 횟수<b id="metaSwap">0</b></div>
      <div class="meta">실제 비교 / 이론값<b id="metaComplexity">—</b></div>
    </div>

    <div class="regen-row">
      <label for="sizeInput">배열 크기</label>
      <input type="number" id="sizeInput" min="5" max="40" value="20">
      <button class="btn ghost" id="btnShuffle">🔀 새 배열</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------- 상태 ----------
  let array = [];
  let steps = [];      // 스텝 기반 재생: 각 스텝은 {array, compareIdx:[], swapIdx:[], doneIdx:[], compareCount, swapCount, note}
  let cur = 0;
  let playing = false;
  let timer = null;
  let currentAlgo = "bubble";

  // 이론적 예상 비교 횟수를 n으로부터 직접 계산 (고정 텍스트가 아니라 실제 산식 적용)
  // 알고리즘 설명 데이터 (간단/상세 + 시간·공간복잡도 + 특징)
  const explainData = {
    bubble: {
      title: "버블 정렬 (Bubble Sort)",
      simple: "이웃한 두 원소를 끝까지 비교하며, 더 큰 값을 뒤로 한 칸씩 밀어내는 방식이에요. 마치 거품이 위로 떠오르듯 큰 값이 뒤로 이동합니다.",
      detail: "배열을 처음부터 끝까지 훑으면서 이웃한 두 원소를 비교해, 순서가 잘못되어 있으면 즉시 교환합니다. 한 번 끝까지 훑으면 가장 큰 값이 맨 뒤로 확정되고, 이 과정을 배열 끝에서부터 한 칸씩 줄여가며 반복합니다. 구현이 단순해 교육용으로 많이 쓰이지만, 비교·교환이 매번 일어나 큰 데이터에는 비효율적입니다.",
      time: "O(n²)",
      space: "O(1)",
      stable: "안정 정렬",
      trait: "구현이 가장 단순, 실무에선 거의 쓰지 않음"
    },
    selection: {
      title: "선택 정렬 (Selection Sort)",
      simple: "남은 구간에서 가장 작은 값을 찾아 맨 앞으로 보내는 걸 반복해요. '가장 작은 걸 골라 앞에 놓기'가 핵심입니다.",
      detail: "정렬되지 않은 구간 전체를 탐색해 최솟값의 위치를 찾고, 그 값을 구간의 맨 앞 원소와 교환합니다. 교환은 구간당 최대 1번만 일어나 교환 횟수가 적다는 게 장점이지만, 비교는 매번 구간 전체를 훑어야 해서 비교 횟수는 버블 정렬과 같습니다.",
      time: "O(n²)",
      space: "O(1)",
      stable: "불안정 정렬",
      trait: "교환 횟수가 적어 쓰기 비용이 큰 데이터에 유리"
    },
    insertion: {
      title: "삽입 정렬 (Insertion Sort)",
      simple: "이미 정렬된 부분에 새 원소를 적절한 위치까지 밀어 넣는 방식이에요. 카드를 손에 쥐고 한 장씩 정렬하는 느낌입니다.",
      detail: "왼쪽부터 차례로 '정렬된 부분'을 늘려가며, 새로 추가되는 원소를 정렬된 부분 안에서 올바른 위치까지 한 칸씩 이동시켜 끼워 넣습니다. 데이터가 이미 거의 정렬되어 있을 경우 비교·교환이 거의 일어나지 않아 O(n)에 가까운 성능을 보이는 것이 특징이며, 작은 데이터셋에서는 다른 O(n log n) 알고리즘보다도 실제로 빠른 경우가 많습니다.",
      time: "최선 O(n) · 평균/최악 O(n²)",
      space: "O(1)",
      stable: "안정 정렬",
      trait: "거의 정렬된 데이터에 특히 강함"
    },
    quick: {
      title: "퀵 정렬 (Quick Sort)",
      simple: "기준값(피벗)을 하나 정해, 그보다 작은 값과 큰 값으로 나눈 뒤 각 그룹을 다시 같은 방식으로 정렬해요.",
      detail: "배열에서 피벗을 하나 선택하고, 피벗보다 작은 값은 왼쪽, 큰 값은 오른쪽으로 분할(partition)합니다. 분할이 끝나면 피벗은 최종 위치에 확정되고, 왼쪽과 오른쪽 구간에 대해 같은 과정을 재귀적으로 반복합니다. 평균적으로 매우 빠르지만, 피벗 선택이 계속 한쪽으로 치우치면(이미 정렬된 배열에서 마지막 원소를 피벗으로 고르는 경우 등) 최악의 경우 O(n²)까지 떨어질 수 있습니다.",
      time: "평균 O(n log n) · 최악 O(n²)",
      space: "O(log n)",
      stable: "불안정 정렬",
      trait: "실무에서 가장 널리 쓰이는 범용 정렬"
    },
    merge: {
      title: "병합 정렬 (Merge Sort)",
      simple: "배열을 반으로 쪼개고 쪼개서 더 이상 못 쪼갤 때까지 나눈 다음, 다시 합치면서 정렬해요. 나눠서 정복하는 방식입니다.",
      detail: "배열을 절반씩 재귀적으로 분할해 더 이상 나눌 수 없는 단일 원소까지 쪼갠 뒤, 두 개의 정렬된 부분 배열을 비교하며 하나로 합치는(merge) 과정을 반복합니다. 분할과 병합이 항상 균등하게 일어나기 때문에 입력 데이터의 상태와 무관하게 항상 O(n log n)을 보장하는 것이 가장 큰 장점이며, 안정 정렬이라 같은 값의 원래 순서가 유지됩니다. 다만 병합 과정에서 추가 배열 공간이 필요합니다.",
      time: "O(n log n) (항상 보장)",
      space: "O(n)",
      stable: "안정 정렬",
      trait: "성능이 입력 상태에 영향받지 않음"
    }
  };
  let explainMode = "simple"; // "simple" | "detail"

  const complexityFormula = {
    bubble:    { label: "O(n²)",         calc: n => Math.round(n*(n-1)/2) },
    selection: { label: "O(n²)",         calc: n => Math.round(n*(n-1)/2) },
    insertion: { label: "O(n²) 평균",     calc: n => Math.round(n*(n-1)/4) }, // 평균 케이스 근사: 최악(n²/2)의 절반
    quick:     { label: "O(n log n) 평균", calc: n => Math.round(n*Math.log2(Math.max(n,2))) },
    merge:     { label: "O(n log n)",     calc: n => Math.round(n*Math.log2(Math.max(n,2))) }
  };

  // ---------- DOM ----------
  const barsEl = document.getElementById("bars");
  const narrationEl = document.getElementById("narration");
  const scrubEl = document.getElementById("scrub");
  const stepLabelEl = document.getElementById("stepLabel");
  const speedEl = document.getElementById("speed");
  const metaCompareEl = document.getElementById("metaCompare");
  const metaSwapEl = document.getElementById("metaSwap");
  const metaComplexityEl = document.getElementById("metaComplexity");
  const sizeInputEl = document.getElementById("sizeInput");
  const explainTitleEl = document.getElementById("explainTitle");
  const explainBodyEl = document.getElementById("explainBody");
  const explainMetaEl = document.getElementById("explainMeta");

  const btnPlay = document.getElementById("btnPlay");
  const btnPrev = document.getElementById("btnPrev");
  const btnNext = document.getElementById("btnNext");
  const btnReset = document.getElementById("btnReset");
  const btnShuffle = document.getElementById("btnShuffle");

  // ---------- 배열 생성 ----------
  function genArray(n){
    const arr = [];
    for(let i=0;i<n;i++) arr.push(Math.floor(Math.random()*94)+5);
    return arr;
  }

  // ---------- 스텝 빌더: 알고리즘은 "스텝 로그"만 생성, 실제 그리기는 별도 ----------
  function buildSteps(algo, inputArr){
    const arr = inputArr.slice();
    const log = [];
    let compareCount = 0, swapCount = 0;

    function snapshot(extra){
      log.push(Object.assign({
        array: arr.slice(),
        compareIdx: [],
        swapIdx: [],
        doneIdx: extra && extra.doneIdx ? extra.doneIdx : [],
        compareCount, swapCount,
        note: ""
      }, extra || {}));
    }

    if(algo === "bubble"){
      const n = arr.length;
      const done = [];
      for(let i=0;i<n-1;i++){
        let swappedAny = false;
        for(let j=0;j<n-1-i;j++){
          compareCount++;
          snapshot({compareIdx:[j,j+1], doneIdx: done.slice(), note: `${arr[j]}와 ${arr[j+1]} 비교`});
          if(arr[j] > arr[j+1]){
            [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
            swapCount++;
            snapshot({swapIdx:[j,j+1], doneIdx: done.slice(), note: `${arr[j+1]} > ${arr[j]} → 교환`});
          }
        }
        done.unshift(n-1-i);
        snapshot({doneIdx: done.slice(), note: `${n-1-i}번째 자리 확정`});
      }
      done.unshift(0);
      snapshot({doneIdx: Array.from({length:n}, (_,k)=>k), note:"정렬 완료"});
    }

    else if(algo === "selection"){
      const n = arr.length;
      const done = [];
      for(let i=0;i<n;i++){
        let minIdx = i;
        snapshot({compareIdx:[i], doneIdx: done.slice(), note:`구간 [${i}, ${n-1}]에서 최솟값 탐색 시작`});
        for(let j=i+1;j<n;j++){
          compareCount++;
          snapshot({compareIdx:[minIdx,j], doneIdx: done.slice(), note:`최소값 후보 ${arr[minIdx]} vs ${arr[j]}`});
          if(arr[j] < arr[minIdx]) minIdx = j;
        }
        if(minIdx !== i){
          [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
          swapCount++;
          snapshot({swapIdx:[i,minIdx], doneIdx: done.slice(), note:`최솟값 ${arr[i]}을 ${i}번 위치로 교환`});
        }
        done.push(i);
        snapshot({doneIdx: done.slice(), note:`${i}번째 자리 확정`});
      }
    }

    else if(algo === "insertion"){
      const n = arr.length;
      snapshot({doneIdx:[0], note:"첫 원소는 정렬된 것으로 간주"});
      for(let i=1;i<n;i++){
        let j = i;
        snapshot({compareIdx:[j], doneIdx: Array.from({length:i}, (_,k)=>k), note:`${arr[i]}를 삽입할 위치 탐색`});
        while(j>0){
          compareCount++;
          snapshot({compareIdx:[j-1,j], doneIdx: Array.from({length:i}, (_,k)=>k), note:`${arr[j-1]}와 ${arr[j]} 비교`});
          if(arr[j-1] > arr[j]){
            [arr[j-1], arr[j]] = [arr[j], arr[j-1]];
            swapCount++;
            snapshot({swapIdx:[j-1,j], doneIdx: Array.from({length:i}, (_,k)=>k), note:"왼쪽으로 한 칸 이동"});
            j--;
          } else break;
        }
        snapshot({doneIdx: Array.from({length:i+1}, (_,k)=>k), note:`${i}번째까지 정렬 상태 유지`});
      }
    }

    else if(algo === "quick"){
      function partition(lo, hi){
        const pivot = arr[hi];
        let i = lo;
        snapshot({compareIdx:[hi], doneIdx:[], note:`피벗 ${pivot} 선택 (구간 [${lo},${hi}])`});
        for(let j=lo;j<hi;j++){
          compareCount++;
          snapshot({compareIdx:[j,hi], doneIdx:[], note:`${arr[j]} vs 피벗 ${pivot}`});
          if(arr[j] < pivot){
            [arr[i], arr[j]] = [arr[j], arr[i]];
            if(i!==j){ swapCount++; snapshot({swapIdx:[i,j], doneIdx:[], note:"피벗보다 작은 값 앞으로 이동"}); }
            i++;
          }
        }
        [arr[i], arr[hi]] = [arr[hi], arr[i]];
        swapCount++;
        snapshot({swapIdx:[i,hi], doneIdx:[], note:`피벗을 ${i}번 위치로 확정`});
        return i;
      }
      function qsort(lo, hi){
        if(lo>=hi){
          if(lo===hi) snapshot({doneIdx:[lo], note:"단일 원소 구간 확정"});
          return;
        }
        const p = partition(lo, hi);
        qsort(lo, p-1);
        qsort(p+1, hi);
      }
      qsort(0, arr.length-1);
      snapshot({doneIdx: Array.from({length:arr.length}, (_,k)=>k), note:"정렬 완료"});
    }

    else if(algo === "merge"){
      const n = arr.length;
      function mergeSort(lo, hi){
        if(lo>=hi) return;
        const mid = Math.floor((lo+hi)/2);
        mergeSort(lo, mid);
        mergeSort(mid+1, hi);
        const left = arr.slice(lo, mid+1);
        const right = arr.slice(mid+1, hi+1);
        let i=0,j=0,k=lo;
        snapshot({compareIdx:[lo, hi], doneIdx:[], note:`[${lo},${mid}]와 [${mid+1},${hi}] 병합 시작`});
        while(i<left.length && j<right.length){
          compareCount++;
          snapshot({compareIdx:[k], doneIdx:[], note:`${left[i]} vs ${right[j]} 비교`});
          if(left[i] <= right[j]){ arr[k]=left[i]; i++; }
          else { arr[k]=right[j]; j++; }
          swapCount++;
          snapshot({swapIdx:[k], doneIdx:[], note:`${arr[k]} 배치`});
          k++;
        }
        while(i<left.length){ arr[k]=left[i]; snapshot({swapIdx:[k], doneIdx:[], note:`${arr[k]} 배치`}); i++; k++; }
        while(j<right.length){ arr[k]=right[j]; snapshot({swapIdx:[k], doneIdx:[], note:`${arr[k]} 배치`}); j++; k++; }
      }
      mergeSort(0, n-1);
      snapshot({doneIdx: Array.from({length:n}, (_,k)=>k), note:"정렬 완료"});
    }

    return log;
  }

  // ---------- 렌더링 ----------
  function renderBars(){
    barsEl.innerHTML = "";
    const max = Math.max(...array, 1);
    array.forEach((val, idx) => {
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.dataset.idx = idx;

      const valEl = document.createElement("div");
      valEl.className = "bar-val";
      valEl.textContent = val;

      const fill = document.createElement("div");
      fill.className = "bar-fill";
      fill.style.height = (val/max*100) + "%";

      bar.appendChild(valEl);
      bar.appendChild(fill);
      barsEl.appendChild(bar);
    });
  }

  function applyStep(step){
    array = step.array;
    const bars = barsEl.children;
    if(bars.length !== array.length) { renderBars(); }

    const max = Math.max(...array, 1);
    for(let i=0;i<array.length;i++){
      const bar = bars[i];
      if(!bar) continue;
      bar.className = "bar";
      const fill = bar.querySelector(".bar-fill");
      const valEl = bar.querySelector(".bar-val");
      fill.style.height = (array[i]/max*100) + "%";
      valEl.textContent = array[i];

      if(step.doneIdx && step.doneIdx.includes(i)) bar.classList.add("done");
      if(step.compareIdx && step.compareIdx.includes(i)) bar.classList.add("compare");
      if(step.swapIdx && step.swapIdx.includes(i)) bar.classList.add("swap");
    }

    narrationEl.innerHTML = step.note ? `<b>${cur+1}.</b> ${step.note}` : "";
    metaCompareEl.textContent = step.compareCount;
    metaSwapEl.textContent = step.swapCount;

    // 실제 비교 횟수(현재 스텝까지 누적) vs 이론적 예상 비교 횟수(n으로부터 계산)
    const theo = complexityFormula[currentAlgo].calc(array.length);
    metaComplexityEl.textContent = `${step.compareCount} / ${theo} (${complexityFormula[currentAlgo].label})`;

    scrubEl.value = cur;
    stepLabelEl.textContent = `${cur+1} / ${steps.length}`;

    btnPrev.disabled = cur<=0;
    btnNext.disabled = cur>=steps.length-1;
  }

  function goTo(idx){
    cur = Math.max(0, Math.min(steps.length-1, idx));
    applyStep(steps[cur]);
    if(cur>=steps.length-1) stopPlay();
  }

  function stepForward(){
    if(cur < steps.length-1){ goTo(cur+1); }
    else stopPlay();
  }

  function startPlay(){
    if(steps.length===0 || cur>=steps.length-1) return;
    playing = true;
    btnPlay.textContent = "⏸ 일시정지";
    const tick = () => {
      stepForward();
      if(playing && cur<steps.length-1){
        const speedVal = Number(speedEl.value); // 1~10
        const delay = 600 - speedVal*50; // 빠를수록 짧게
        timer = setTimeout(tick, Math.max(40, delay));
      } else {
        stopPlay();
      }
    };
    tick();
  }

  function stopPlay(){
    playing = false;
    btnPlay.textContent = "▶ 재생";
    if(timer) clearTimeout(timer);
  }

  function renderExplain(algo){
    const data = explainData[algo];
    if(!data) return;
    explainTitleEl.textContent = data.title;
    explainBodyEl.textContent = explainMode === "simple" ? data.simple : data.detail;

    if(explainMode === "detail"){
      explainMetaEl.innerHTML = `
        <li>시간복잡도<b>${data.time}</b></li>
        <li>공간복잡도<b>${data.space}</b></li>
        <li>안정성<b>${data.stable}</b></li>
        <li>특징<b>${data.trait}</b></li>
      `;
    } else {
      explainMetaEl.innerHTML = "";
    }
  }

  function rebuild(algo){
    currentAlgo = algo;
    stopPlay();
    steps = buildSteps(algo, array);
    cur = 0;
    scrubEl.max = steps.length-1;
    renderBars();
    applyStep(steps[0]);
    renderExplain(algo);
  }

  function newArray(){
    const n = Math.max(5, Math.min(40, Number(sizeInputEl.value) || 20));
    array = genArray(n);
    rebuild(currentAlgo);
  }

  // ---------- 이벤트 ----------
  document.querySelectorAll(".algo-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".algo-tab").forEach(t=>t.classList.remove("active"));
      tab.classList.add("active");
      rebuild(tab.dataset.algo);
    });
  });

  document.querySelectorAll(".explain-toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".explain-toggle-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      explainMode = btn.dataset.mode;
      renderExplain(currentAlgo);
    });
  });

  btnPlay.addEventListener("click", () => playing ? stopPlay() : startPlay());
  btnPrev.addEventListener("click", () => { stopPlay(); goTo(cur-1); });
  btnNext.addEventListener("click", () => { stopPlay(); goTo(cur+1); });
  btnReset.addEventListener("click", () => { stopPlay(); goTo(0); });
  btnShuffle.addEventListener("click", newArray);
  scrubEl.addEventListener("input", (e) => { stopPlay(); goTo(Number(e.target.value)); });

  document.addEventListener("keydown", (e) => {
    if(e.target.tagName === "INPUT") return;
    if(e.code === "Space"){ e.preventDefault(); playing ? stopPlay() : startPlay(); }
    if(e.code === "ArrowRight"){ stopPlay(); goTo(cur+1); }
    if(e.code === "ArrowLeft"){ stopPlay(); goTo(cur-1); }
  });

  // ---------- 초기화 ----------
  array = genArray(20);
  rebuild("bubble");
})();
</script>
</body>
