<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>알고리즘 시각화</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  :root{
    --paper:#F7F3EC;
    --paper-deep:#EFE9DD;
    --ink:#1F3A2E;
    --ink-soft:#3F5A4C;
    --line:#D9D2C2;
    --compare:#D98E48;
    --swap:#B5483A;
    --done:#5B8C6E;
    --frontier:#C9A876;
    --mono:'IBM Plex Mono', monospace;
    --sans:'Pretendard', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    padding:48px 24px 96px;
  }
  header{
    margin-bottom:0;
    padding-bottom:24px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.12em;
    color:var(--ink-soft);
    text-transform:uppercase;
  }
  h1{
    font-size:28px;
    font-weight:700;
    margin:8px 0 0;
    letter-spacing:-0.01em;
  }

  /* 카테고리 탭 (1단계: 정렬 / 그래프) */
  .category-tabs{
    display:flex;
    gap:8px;
    margin-top:28px;
    border-bottom:1px solid var(--line);
    padding-bottom:0;
  }
  .category-tab{
    font-family:var(--sans);
    font-size:15px;
    font-weight:600;
    padding:10px 18px 12px;
    border:none;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    border-bottom:3px solid transparent;
    margin-bottom:-1px;
    transition:all .15s ease;
  }
  .category-tab:hover{ color:var(--ink); }
  .category-tab.active{
    color:var(--ink);
    border-bottom-color:var(--ink);
  }

  /* 세부 알고리즘 탭 (2단계) */
  .algo-tabs{
    display:flex;
    gap:6px;
    margin-top:18px;
    flex-wrap:wrap;
  }
  .algo-tab{
    font-family:var(--mono);
    font-size:13px;
    padding:8px 14px;
    border:1px solid var(--line);
    border-radius:7px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
  }
  .algo-tab:hover{ border-color:var(--ink-soft); }
  .algo-tab.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .explain-box{
    margin-top:20px;
    padding:18px 22px;
    background:transparent;
    border:1px solid var(--line);
    border-radius:12px;
  }
  .explain-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  .explain-title{
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    color:var(--ink);
    letter-spacing:0.02em;
  }
  .explain-toggle{
    display:flex;
    gap:4px;
    background:var(--paper-deep);
    border-radius:7px;
    padding:3px;
  }
  .explain-toggle-btn{
    font-family:var(--mono);
    font-size:11px;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .explain-toggle-btn.active{
    background:var(--ink);
    color:var(--paper);
  }
  .explain-body{
    margin:14px 0 0;
    font-size:14px;
    line-height:1.65;
    color:var(--ink-soft);
  }
  .explain-meta{
    list-style:none;
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    margin:14px 0 0;
    padding:12px 0 0;
    border-top:1px dashed var(--line);
  }
  .explain-meta li{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .explain-meta li b{
    display:block;
    color:var(--ink);
    font-size:13px;
    margin-top:2px;
  }
  .explain-meta:empty{ display:none; border-top:none; margin-top:0; padding-top:0; }

  .stage{
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px 28px 28px;
    margin-top:28px;
  }

  /* ---- 정렬용 막대그래프 ---- */
  .bars{
    position:relative;
    height:280px;
    display:flex;
    align-items:flex-end;
    gap:6px;
    padding:0 4px;
  }
  .bar{
    flex:1;
    height:100%;
    position:relative;
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    transition:transform .25s ease;
  }
  .bar-fill{
    width:100%;
    flex-shrink:0;
    background:var(--ink-soft);
    border-radius:4px 4px 2px 2px;
    transition:height .28s cubic-bezier(.4,0,.2,1), background .15s ease;
  }
  .bar.compare .bar-fill{ background:var(--compare); }
  .bar.swap .bar-fill{ background:var(--swap); }
  .bar.done .bar-fill{ background:var(--done); }
  .bar-val{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .bar.compare .bar-val, .bar.swap .bar-val{ color:var(--ink); font-weight:600; }

  /* ---- 그래프용 캔버스 ---- */
  .graph-area{
    position:relative;
    width:100%;
    height:280px;
  }
  .graph-area canvas{
    width:100%;
    height:100%;
    display:block;
  }

  .dist-panel{
    margin-top:18px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .dist-chip{
    font-family:var(--mono);
    font-size:12px;
    padding:6px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    color:var(--ink-soft);
    background:var(--paper);
  }
  .dist-chip b{ color:var(--ink); margin-left:4px; }
  .dist-chip.updated{ border-color:var(--compare); color:var(--ink); }
  .dist-chip.final{ border-color:var(--done); }

  .queue-panel{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .queue-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .queue-items{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  .queue-chip{
    font-family:var(--mono);
    font-size:12px;
    padding:5px 10px;
    border-radius:6px;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink-soft);
  }
  .queue-chip.head{
    background:var(--compare);
    color:var(--paper);
    border-color:var(--compare);
  }

  .narration{
    margin-top:16px;
    font-size:14px;
    color:var(--ink-soft);
    min-height:20px;
  }
  .narration b{ color:var(--ink); }

  .controls{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:28px;
    flex-wrap:wrap;
  }
  .btn{
    font-family:var(--mono);
    font-size:13px;
    border:1px solid var(--ink);
    background:var(--ink);
    color:var(--paper);
    border-radius:8px;
    padding:10px 16px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn.ghost{
    background:transparent;
    color:var(--ink);
  }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn:focus-visible, .algo-tab:focus-visible, .category-tab:focus-visible, input:focus-visible{
    outline:2px solid var(--swap);
    outline-offset:2px;
  }

  .scrub{
    flex:1;
    min-width:160px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .scrub input[type=range]{
    flex:1;
    accent-color:var(--ink);
  }
  .step-label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
  }

  .speed{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .speed input[type=range]{ width:90px; accent-color:var(--ink-soft); }

  .meta-row{
    display:flex;
    gap:24px;
    margin-top:20px;
    flex-wrap:wrap;
  }
  .meta{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .meta b{
    color:var(--ink);
    font-size:14px;
    display:block;
    margin-top:2px;
  }

  .regen-row{
    display:flex;
    gap:10px;
    margin-top:24px;
    align-items:center;
    flex-wrap:wrap;
  }
  .regen-row label{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-soft);
  }
  .regen-row input[type=number]{
    width:64px;
    font-family:var(--mono);
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
  }
  .custom-input{
    flex:1;
    min-width:160px;
    max-width:320px;
    font-family:var(--mono);
    font-size:13px;
    padding:6px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
    color:var(--ink);
  }
  .custom-input-error{
    font-family:var(--mono);
    font-size:12px;
    color:var(--swap);
  }

  .ds-view{
    position:relative;
    width:100%;
    min-height:260px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    overflow-x:auto;
    padding:12px 4px;
  }
  .ds-empty{
    font-family:var(--mono);
    font-size:13px;
    color:var(--ink-soft);
    opacity:.6;
    align-self:center;
  }

  /* 스택/큐: 박스를 가로 또는 세로로 나열 */
  .ds-row{
    display:flex;
    align-items:flex-end;
    gap:8px;
    flex-wrap:nowrap;
  }
  .ds-col{
    display:flex;
    flex-direction:column-reverse;
    align-items:center;
    gap:8px;
  }
  .ds-box{
    min-width:52px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--ink-soft);
    color:var(--paper);
    border-radius:8px;
    font-family:var(--mono);
    font-size:14px;
    font-weight:600;
    position:relative;
    flex-shrink:0;
    transition:background .15s ease;
  }
  .ds-box.highlight{ background:var(--compare); }
  .ds-box.removing{ background:var(--swap); }
  .ds-box-label{
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    font-family:var(--mono);
    font-size:10px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .ds-box-label-left{ left:0; transform:none; }
  .ds-box-label-right{ left:auto; right:0; transform:none; }

  /* 연결 리스트: 노드 + 화살표 */
  .ds-ll-node{
    display:flex;
    align-items:center;
    gap:4px;
    flex-shrink:0;
  }
  .ds-ll-arrow{
    font-family:var(--mono);
    font-size:16px;
    color:var(--ink-soft);
  }

  /* 트리: SVG로 그림 */
  .ds-tree-svg{
    width:100%;
    height:280px;
  }

  .ds-controls{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
    align-items:center;
  }
  .ds-controls input[type=number],
  .ds-controls input[type=text]{
    width:90px;
    font-family:var(--mono);
    font-size:13px;
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--paper);
    color:var(--ink);
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  @media (max-width:600px){
    .bars{ height:200px; gap:3px; }
    .bar-val{ font-size:9px; }
    .graph-area{ height:240px; }
    h1{ font-size:22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Algorithm Visualizer</div>
    <h1 id="pageTitle">알고리즘 시각화</h1>

    <div class="category-tabs" role="tablist" aria-label="카테고리 선택">
      <button class="category-tab active" data-category="sort">정렬</button>
      <button class="category-tab" data-category="graph">그래프 탐색</button>
      <button class="category-tab" data-category="ds">자료구조</button>
    </div>

    <div class="algo-tabs" id="algoTabs" role="tablist" aria-label="알고리즘 선택">
      <!-- JS로 채워짐 -->
    </div>
  </header>

  <div class="explain-box">
    <div class="explain-head">
      <span class="explain-title" id="explainTitle"></span>
      <div class="explain-toggle" role="tablist" aria-label="설명 분량 선택">
        <button class="explain-toggle-btn active" data-mode="simple">간단히</button>
        <button class="explain-toggle-btn" data-mode="detail">자세히</button>
      </div>
    </div>
    <p class="explain-body" id="explainBody"></p>
    <ul class="explain-meta" id="explainMeta"></ul>
  </div>

  <div class="stage" id="mainStage">
    <!-- 정렬용 -->
    <div class="bars" id="bars"></div>
    <!-- 그래프용 -->
    <div class="graph-area" id="graphArea" style="display:none;">
      <canvas id="graphCanvas"></canvas>
    </div>

    <div class="queue-panel" id="queuePanel" style="display:none;">
      <span class="queue-label" id="queueLabel">큐</span>
      <div class="queue-items" id="queueItems"></div>
    </div>
    <div class="dist-panel" id="distPanel" style="display:none;"></div>

    <div class="narration" id="narration">재생을 눌러 시작하세요.</div>

    <div class="controls">
      <button class="btn ghost" id="btnReset" title="처음으로">처음</button>
      <button class="btn ghost" id="btnPrev" title="이전 스텝">이전</button>
      <button class="btn" id="btnPlay" title="재생/일시정지">재생</button>
      <button class="btn ghost" id="btnNext" title="다음 스텝">다음</button>

      <div class="scrub">
        <input type="range" id="scrub" min="0" max="0" value="0">
        <span class="step-label" id="stepLabel">0 / 0</span>
      </div>

      <div class="speed">
        속도
        <input type="range" id="speed" min="1" max="10" value="5">
      </div>
    </div>

    <div class="meta-row" id="metaRowSort">
      <div class="meta">비교 횟수<b id="metaCompare">0</b></div>
      <div class="meta">교환 횟수<b id="metaSwap">0</b></div>
      <div class="meta">실제 비교 / 이론값<b id="metaComplexity">—</b></div>
    </div>
    <div class="meta-row" id="metaRowGraph" style="display:none;">
      <div class="meta">방문한 노드<b id="metaVisited">0</b></div>
      <div class="meta">탐색한 엣지<b id="metaEdges">0</b></div>
      <div class="meta">시간복잡도<b id="metaGraphComplexity">—</b></div>
    </div>

    <div class="regen-row">
      <label for="sizeInput" id="sizeLabel">배열 크기</label>
      <input type="number" id="sizeInput" min="5" max="40" value="20">
      <button class="btn ghost" id="btnShuffle">새로 생성</button>
    </div>

    <div class="regen-row" id="customInputRow">
      <label for="customInput">직접 입력</label>
      <input type="text" id="customInput" placeholder="예: 5, 3, 8, 1, 9" class="custom-input">
      <button class="btn ghost" id="btnApplyCustom">적용</button>
      <span class="custom-input-error" id="customInputError"></span>
    </div>
  </div>

  <div class="stage" id="dsStage" style="display:none;">
    <div class="ds-view" id="dsView"></div>
    <div class="narration" id="dsNarration">아래에서 동작을 선택해 실행해보세요.</div>

    <div class="ds-controls" id="dsControls"></div>

    <div class="meta-row">
      <div class="meta">현재 크기<b id="dsSize">0</b></div>
      <div class="meta">총 동작 횟수<b id="dsOpCount">0</b></div>
    </div>

    <div class="regen-row">
      <button class="btn ghost" id="btnDsReset">초기화</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  // ===================================================================
  // 공통 상태
  // ===================================================================
  let category = "sort";       // "sort" | "graph"
  let currentAlgo = "bubble";
  let explainMode = "simple";
  let steps = [];
  let cur = 0;
  let playing = false;
  let timer = null;

  // 정렬 상태
  let array = [];
  // 그래프 상태
  let nodes = [], edges = [], adj = [];
  let startNode = 0;

  // ===================================================================
  // DOM 참조
  // ===================================================================
  const pageTitleEl = document.getElementById("pageTitle");
  const algoTabsEl = document.getElementById("algoTabs");
  const barsEl = document.getElementById("bars");
  const graphAreaEl = document.getElementById("graphArea");
  const canvas = document.getElementById("graphCanvas");
  const ctx = canvas.getContext("2d");

  const narrationEl = document.getElementById("narration");
  const scrubEl = document.getElementById("scrub");
  const stepLabelEl = document.getElementById("stepLabel");
  const speedEl = document.getElementById("speed");

  const metaRowSortEl = document.getElementById("metaRowSort");
  const metaRowGraphEl = document.getElementById("metaRowGraph");
  const metaCompareEl = document.getElementById("metaCompare");
  const metaSwapEl = document.getElementById("metaSwap");
  const metaComplexityEl = document.getElementById("metaComplexity");
  const metaVisitedEl = document.getElementById("metaVisited");
  const metaEdgesEl = document.getElementById("metaEdges");
  const metaGraphComplexityEl = document.getElementById("metaGraphComplexity");

  const sizeInputEl = document.getElementById("sizeInput");
  const sizeLabelEl = document.getElementById("sizeLabel");
  const queuePanelEl = document.getElementById("queuePanel");
  const queueLabelEl = document.getElementById("queueLabel");
  const queueItemsEl = document.getElementById("queueItems");
  const distPanelEl = document.getElementById("distPanel");

  const explainTitleEl = document.getElementById("explainTitle");
  const explainBodyEl = document.getElementById("explainBody");
  const explainMetaEl = document.getElementById("explainMeta");

  const btnPlay = document.getElementById("btnPlay");
  const btnPrev = document.getElementById("btnPrev");
  const btnNext = document.getElementById("btnNext");
  const btnReset = document.getElementById("btnReset");
  const btnShuffle = document.getElementById("btnShuffle");
  const customInputRowEl = document.getElementById("customInputRow");
  const customInputEl = document.getElementById("customInput");
  const customInputErrorEl = document.getElementById("customInputError");
  const btnApplyCustom = document.getElementById("btnApplyCustom");

  // ===================================================================
  // 알고리즘 목록 / 설명 데이터
  // ===================================================================
  const algoList = {
    sort: [
      { key:"bubble", label:"버블 정렬" },
      { key:"selection", label:"선택 정렬" },
      { key:"insertion", label:"삽입 정렬" },
      { key:"quick", label:"퀵 정렬" },
      { key:"merge", label:"병합 정렬" }
    ],
    graph: [
      { key:"bfs", label:"BFS" },
      { key:"dfs", label:"DFS" },
      { key:"dijkstra", label:"다익스트라" }
    ],
    ds: [
      { key:"stack", label:"스택" },
      { key:"queue", label:"큐" },
      { key:"linkedlist", label:"연결 리스트" },
      { key:"tree", label:"이진 탐색 트리" }
    ]
  };

  const explainData = {
    bubble: {

  const complexityFormula = {
    bubble:    { label: "O(n²)",         calc: n => Math.round(n*(n-1)/2) },
    selection: { label: "O(n²)",         calc: n => Math.round(n*(n-1)/2) },
    insertion: { label: "O(n²) 평균",     calc: n => Math.round(n*(n-1)/4) },
    quick:     { label: "O(n log n) 평균", calc: n => Math.round(n*Math.log2(Math.max(n,2))) },
    merge:     { label: "O(n log n)",     calc: n => Math.round(n*Math.log2(Math.max(n,2))) }
  };
  const graphComplexityLabel = {
    bfs: "O(V + E)", dfs: "O(V + E)", dijkstra: "O((V+E) log V)"
  };

  // ===================================================================
  // 정렬: 배열 생성 + 스텝 빌더
  // ===================================================================
  function genArray(n){
    const arr = [];
    for(let i=0;i<n;i++) arr.push(Math.floor(Math.random()*94)+5);
    return arr;
  }

  function buildSortSteps(algo, inputArr){
    const arr = inputArr.slice();
    const log = [];
    let compareCount = 0, swapCount = 0;

    function snapshot(extra){
      log.push(Object.assign({
        array: arr.slice(), compareIdx: [], swapIdx: [], doneIdx: extra && extra.doneIdx ? extra.doneIdx : [],
        compareCount, swapCount, note: ""
      }, extra || {}));
    }

    if(algo === "bubble"){
      const n = arr.length;
      const done = [];
      for(let i=0;i<n-1;i++){
        for(let j=0;j<n-1-i;j++){
          compareCount++;
          snapshot({compareIdx:[j,j+1], doneIdx: done.slice(), note: `${arr[j]}와 ${arr[j+1]} 비교`});
          if(arr[j] > arr[j+1]){
            [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
            swapCount++;
            snapshot({swapIdx:[j,j+1], doneIdx: done.slice(), note: `${arr[j+1]} > ${arr[j]} → 교환`});
          }
        }
        done.unshift(n-1-i);
        snapshot({doneIdx: done.slice(), note: `${n-1-i}번째 자리 확정`});
      }
      snapshot({doneIdx: Array.from({length:n}, (_,k)=>k), note:"정렬 완료"});
    }

    else if(algo === "selection"){
      const n = arr.length;
      const done = [];
      for(let i=0;i<n;i++){
        let minIdx = i;
        snapshot({compareIdx:[i], doneIdx: done.slice(), note:`구간 [${i}, ${n-1}]에서 최솟값 탐색 시작`});
        for(let j=i+1;j<n;j++){
          compareCount++;
          snapshot({compareIdx:[minIdx,j], doneIdx: done.slice(), note:`최소값 후보 ${arr[minIdx]} vs ${arr[j]}`});
          if(arr[j] < arr[minIdx]) minIdx = j;
        }
        if(minIdx !== i){
          [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
          swapCount++;
          snapshot({swapIdx:[i,minIdx], doneIdx: done.slice(), note:`최솟값 ${arr[i]}을 ${i}번 위치로 교환`});
        }
        done.push(i);
        snapshot({doneIdx: done.slice(), note:`${i}번째 자리 확정`});
      }
    }

    else if(algo === "insertion"){
      const n = arr.length;
      snapshot({doneIdx:[0], note:"첫 원소는 정렬된 것으로 간주"});
      for(let i=1;i<n;i++){
        let j = i;
        snapshot({compareIdx:[j], doneIdx: Array.from({length:i}, (_,k)=>k), note:`${arr[i]}를 삽입할 위치 탐색`});
        while(j>0){
          compareCount++;
          snapshot({compareIdx:[j-1,j], doneIdx: Array.from({length:i}, (_,k)=>k), note:`${arr[j-1]}와 ${arr[j]} 비교`});
          if(arr[j-1] > arr[j]){
            [arr[j-1], arr[j]] = [arr[j], arr[j-1]];
            swapCount++;
            snapshot({swapIdx:[j-1,j], doneIdx: Array.from({length:i}, (_,k)=>k), note:"왼쪽으로 한 칸 이동"});
            j--;
          } else break;
        }
        snapshot({doneIdx: Array.from({length:i+1}, (_,k)=>k), note:`${i}번째까지 정렬 상태 유지`});
      }
    }

    else if(algo === "quick"){
      function partition(lo, hi){
        const pivot = arr[hi];
        let i = lo;
        snapshot({compareIdx:[hi], doneIdx:[], note:`피벗 ${pivot} 선택 (구간 [${lo},${hi}])`});
        for(let j=lo;j<hi;j++){
          compareCount++;
          snapshot({compareIdx:[j,hi], doneIdx:[], note:`${arr[j]} vs 피벗 ${pivot}`});
          if(arr[j] < pivot){
            [arr[i], arr[j]] = [arr[j], arr[i]];
            if(i!==j){ swapCount++; snapshot({swapIdx:[i,j], doneIdx:[], note:"피벗보다 작은 값 앞으로 이동"}); }
            i++;
          }
        }
        [arr[i], arr[hi]] = [arr[hi], arr[i]];
        swapCount++;
        snapshot({swapIdx:[i,hi], doneIdx:[], note:`피벗을 ${i}번 위치로 확정`});
        return i;
      }
      function qsort(lo, hi){
        if(lo>=hi){
          if(lo===hi) snapshot({doneIdx:[lo], note:"단일 원소 구간 확정"});
          return;
        }
        const p = partition(lo, hi);
        qsort(lo, p-1);
        qsort(p+1, hi);
      }
      qsort(0, arr.length-1);
      snapshot({doneIdx: Array.from({length:arr.length}, (_,k)=>k), note:"정렬 완료"});
    }

    else if(algo === "merge"){
      const n = arr.length;
      function mergeSort(lo, hi){
        if(lo>=hi) return;
        const mid = Math.floor((lo+hi)/2);
        mergeSort(lo, mid);
        mergeSort(mid+1, hi);
        const left = arr.slice(lo, mid+1);
        const right = arr.slice(mid+1, hi+1);
        let i=0,j=0,k=lo;
        snapshot({compareIdx:[lo, hi], doneIdx:[], note:`[${lo},${mid}]와 [${mid+1},${hi}] 병합 시작`});
        while(i<left.length && j<right.length){
          compareCount++;
          snapshot({compareIdx:[k], doneIdx:[], note:`${left[i]} vs ${right[j]} 비교`});
          if(left[i] <= right[j]){ arr[k]=left[i]; i++; }
          else { arr[k]=right[j]; j++; }
          swapCount++;
          snapshot({swapIdx:[k], doneIdx:[], note:`${arr[k]} 배치`});
          k++;
        }
        while(i<left.length){ arr[k]=left[i]; snapshot({swapIdx:[k], doneIdx:[], note:`${arr[k]} 배치`}); i++; k++; }
        while(j<right.length){ arr[k]=right[j]; snapshot({swapIdx:[k], doneIdx:[], note:`${arr[k]} 배치`}); j++; k++; }
      }
      mergeSort(0, n-1);
      snapshot({doneIdx: Array.from({length:n}, (_,k)=>k), note:"정렬 완료"});
    }

    return log;
  }

  // ===================================================================
  // 그래프: 생성 + 스텝 빌더
  // ===================================================================
  function genGraph(n){
    const newNodes = [];
    const cx = 0.5, cy = 0.5, r = 0.4;
    for(let i=0;i<n;i++){
      const angle = (Math.PI*2*i/n) - Math.PI/2;
      newNodes.push({ id:i, x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle) });
    }
    const newEdges = [];
    const edgeSet = new Set();
    function addEdge(a,b){
      const key = a<b ? a+"_"+b : b+"_"+a;
      if(edgeSet.has(key) || a===b) return false;
      edgeSet.add(key);
      newEdges.push({a, b, weight: Math.floor(Math.random()*9)+1});
      return true;
    }
    const visited = new Set([0]);
    const remaining = Array.from({length:n-1}, (_,i)=>i+1);
    for(let i=remaining.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
    }
    remaining.forEach(node => {
      const visitedArr = Array.from(visited);
      const parent = visitedArr[Math.floor(Math.random()*visitedArr.length)];
      addEdge(parent, node);
      visited.add(node);
    });
    const extra = Math.max(1, Math.floor(n*0.6));
    let attempts = 0, added = 0;
    while(added < extra && attempts < extra*10){
      attempts++;
      const a = Math.floor(Math.random()*n);
      const b = Math.floor(Math.random()*n);
      if(addEdge(a,b)) added++;
    }
    const newAdj = Array.from({length:n}, ()=>[]);
    newEdges.forEach(e => {
      newAdj[e.a].push({to:e.b, weight:e.weight});
      newAdj[e.b].push({to:e.a, weight:e.weight});
    });
    return { nodes:newNodes, edges:newEdges, adj:newAdj };
  }

  function buildGraphSteps(algo, start){
    const log = [];
    let visitedCount = 0, edgeCount = 0;
    function snapshot(extra){
      log.push(Object.assign({
        visitedSet:[], currentNode:null, queue:[], dist:null, finalSet:[],
        note:"", visitedCount, edgeCount
      }, extra || {}));
    }

    if(algo === "bfs"){
      const visited = new Set([start]);
      const queue = [start];
      snapshot({ visitedSet:[start], queue:queue.slice(), note:`시작 노드 ${start}를 큐에 추가` });
      while(queue.length){
        const node = queue.shift();
        visitedCount++;
        snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:queue.slice(), visitedCount, note:`노드 ${node} 방문 (큐에서 꺼냄)` });
        const neighbors = adj[node].map(e=>e.to).sort((a,b)=>a-b);
        for(const next of neighbors){
          edgeCount++;
          if(!visited.has(next)){
            visited.add(next);
            queue.push(next);
            snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:queue.slice(), edgeCount, note:`이웃 ${next} 발견 → 큐에 추가` });
          } else {
            snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:queue.slice(), edgeCount, note:`이웃 ${next}는 이미 방문함` });
          }
        }
      }
      snapshot({ visitedSet:Array.from(visited), queue:[], visitedCount, edgeCount, note:"탐색 완료" });
    }

    else if(algo === "dfs"){
      const visited = new Set();
      const stack = [start];
      snapshot({ visitedSet:[], queue:stack.slice(), note:`시작 노드 ${start}를 스택에 추가` });
      while(stack.length){
        const node = stack.pop();
        if(visited.has(node)){
          snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:stack.slice(), note:`노드 ${node}는 이미 방문 → 스킵` });
          continue;
        }
        visited.add(node);
        visitedCount++;
        snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:stack.slice(), visitedCount, note:`노드 ${node} 방문 (스택에서 꺼냄)` });
        const neighbors = adj[node].map(e=>e.to).sort((a,b)=>b-a);
        for(const next of neighbors){
          edgeCount++;
          if(!visited.has(next)){
            stack.push(next);
            snapshot({ visitedSet:Array.from(visited), currentNode:node, queue:stack.slice(), edgeCount, note:`이웃 ${next}를 스택에 추가` });
          }
        }
      }
      snapshot({ visitedSet:Array.from(visited), queue:[], visitedCount, edgeCount, note:"탐색 완료" });
    }

    else if(algo === "dijkstra"){
      const n = nodes.length;
      const dist = Array(n).fill(Infinity);
      dist[start] = 0;
      const finalized = new Set();
      snapshot({ dist:dist.slice(), finalSet:[], note:`시작 노드 ${start}의 거리를 0으로 초기화` });
      while(finalized.size < n){
        let u = -1, best = Infinity;
        for(let i=0;i<n;i++) if(!finalized.has(i) && dist[i] < best){ best = dist[i]; u = i; }
        if(u === -1) break;
        finalized.add(u);
        visitedCount++;
        snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), currentNode:u, visitedCount, note:`거리가 가장 짧은 노드 ${u}(거리 ${dist[u]}) 확정` });
        const neighbors = adj[u].slice().sort((a,b)=>a.to-b.to);
        for(const {to, weight} of neighbors){
          edgeCount++;
          if(finalized.has(to)) continue;
          const newDist = dist[u] + weight;
          if(newDist < dist[to]){
            const old = dist[to];
            dist[to] = newDist;
            snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), currentNode:u, edgeCount, note:`${u}→${to} 경로로 거리 갱신: ${old===Infinity?"∞":old} → ${newDist}` });
          } else {
            snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), currentNode:u, edgeCount, note:`${u}→${to}: 기존 거리(${dist[to]})가 더 짧아 갱신 안 함` });
          }
        }
      }
      snapshot({ dist:dist.slice(), finalSet:Array.from(finalized), visitedCount, edgeCount, note:"모든 노드의 최단 거리 확정 완료" });
    }

    return log;
  }

  // ===================================================================
  // 자료구조: 상태 + 동작 + 렌더링
  // ===================================================================
  // 자료구조별로 완전히 독립된 상태를 유지합니다 (탭을 옮겨다녀도 서로의 데이터가 보존됩니다)
  const dsState = {
    stack: { data: [5, 2, 8], opCount: 0, highlightIdx: null, initialized: false },
    queue: { data: [3, 7, 1], opCount: 0, highlightIdx: null, initialized: false },
    linkedlist: { data: [4, 9, 2, 6], opCount: 0, highlightIdx: null, initialized: false },
    tree: { tree: null, opCount: 0, lastFound: null, initialized: false }
  };

  function dsEnsureInitialized(kind){
    const st = dsState[kind];
    if(st.initialized) return;
    st.initialized = true;
    if(kind === "tree"){
      [8, 3, 10, 1, 6, 14, 4].forEach(v => dsTreeInsertInto(st, v, /*silent=*/true));
      st.opCount = 0;
      st.lastFound = null;
    }
  }

  function dsNarrate(text){
    const el = document.getElementById("dsNarration");
    if(el) el.textContent = text;
  }

  function dsPush(val){
    const st = dsState.stack;
    st.data.push(val);
    st.opCount++;
    st.highlightIdx = st.data.length - 1;
    dsNarrate(`${val}을 스택 맨 위에 추가했습니다 (push)`);
  }
  function dsPop(){
    const st = dsState.stack;
    if(st.data.length === 0){ dsNarrate("스택이 비어 있어 꺼낼 수 없습니다 (pop)"); return; }
    const val = st.data.pop();
    st.opCount++;
    st.highlightIdx = null;
    dsNarrate(`스택 맨 위에서 ${val}을 꺼냈습니다 (pop)`);
  }

  function dsEnqueue(val){
    const st = dsState.queue;
    st.data.push(val);
    st.opCount++;
    st.highlightIdx = st.data.length - 1;
    dsNarrate(`${val}을 큐의 맨 뒤에 추가했습니다 (enqueue)`);
  }
  function dsDequeue(){
    const st = dsState.queue;
    if(st.data.length === 0){ dsNarrate("큐가 비어 있어 꺼낼 수 없습니다 (dequeue)"); return; }
    const val = st.data.shift();
    st.opCount++;
    st.highlightIdx = null;
    dsNarrate(`큐의 맨 앞에서 ${val}을 꺼냈습니다 (dequeue)`);
  }

  function dsListAddLast(val){
    const st = dsState.linkedlist;
    st.data.push(val);
    st.opCount++;
    st.highlightIdx = st.data.length - 1;
    dsNarrate(`${val}을 리스트 맨 뒤에 추가했습니다`);
  }
  function dsListAddFirst(val){
    const st = dsState.linkedlist;
    st.data.unshift(val);
    st.opCount++;
    st.highlightIdx = 0;
    dsNarrate(`${val}을 리스트 맨 앞에 추가했습니다`);
  }
  function dsListRemove(val){
    const st = dsState.linkedlist;
    const idx = st.data.indexOf(val);
    if(idx === -1){ dsNarrate(`${val}을 찾을 수 없습니다`); return; }
    st.data.splice(idx, 1);
    st.opCount++;
    st.highlightIdx = null;
    dsNarrate(`${val}을 리스트에서 제거했습니다`);
  }

  // 트리에 값을 삽입하는 핵심 로직 (silent=true면 초기 예시 데이터를 채울 때처럼 내레이션 없이 조용히 삽입)
  function dsTreeInsertInto(st, val, silent){
    if(!silent) st.opCount++;
    const path = [];
    if(st.tree === null){
      st.tree = { value: val, left: null, right: null };
      path.push(val);
      if(!silent){ st.lastFound = path; dsNarrate(`${val}을 루트 노드로 추가했습니다`); }
      return;
    }
    let cur = st.tree;
    while(true){
      path.push(cur.value);
      if(val === cur.value){
        if(!silent){ st.lastFound = path; dsNarrate(`${val}은 이미 트리에 존재합니다`); }
        return;
      }
      if(val < cur.value){
        if(cur.left === null){ cur.left = { value: val, left: null, right: null }; path.push(val); break; }
        cur = cur.left;
      } else {
        if(cur.right === null){ cur.right = { value: val, left: null, right: null }; path.push(val); break; }
        cur = cur.right;
      }
    }
    if(!silent){ st.lastFound = path; dsNarrate(`${val}을 트리에 추가했습니다`); }
  }

  function dsTreeInsert(val){
    dsTreeInsertInto(dsState.tree, val, false);
  }

  function dsTreeFind(val){
    const st = dsState.tree;
    st.opCount++;
    const path = [];
    let cur = st.tree;
    while(cur){
      path.push(cur.value);
      if(val === cur.value){ st.lastFound = path; dsNarrate(`${val}을 트리에서 찾았습니다`); return; }
      cur = val < cur.value ? cur.left : cur.right;
    }
    st.lastFound = path;
    dsNarrate(`${val}은 트리에 없습니다`);
  }

  // 노드를 삭제하면서 지나간 경로(path)를 함께 추적해 강조 표시에 사용
  function dsTreeDelete(val){
    const st = dsState.tree;
    st.opCount++;
    const path = [];

    function findMin(node){
      while(node.left) node = node.left;
      return node;
    }

    function removeNode(node, val){
      if(node === null) return null;
      path.push(node.value);

      if(val < node.value){
        node.left = removeNode(node.left, val);
        return node;
      }
      if(val > node.value){
        node.right = removeNode(node.right, val);
        return node;
      }

      // val === node.value : 이 노드를 삭제해야 함
      if(node.left === null && node.right === null){
        // 경우 1: 자식이 없음 -> 그냥 제거
        return null;
      }
      if(node.left === null){
        // 경우 2: 오른쪽 자식만 있음 -> 오른쪽 자식을 끌어올림
        return node.right;
      }
      if(node.right === null){
        // 경우 2: 왼쪽 자식만 있음 -> 왼쪽 자식을 끌어올림
        return node.left;
      }
      // 경우 3: 자식이 둘 -> 오른쪽 서브트리에서 가장 작은 값을 가져와 대체
      const successor = findMin(node.right);
      node.value = successor.value;
      node.right = removeNode(node.right, successor.value);
      return node;
    }

    const existed = (function has(node){
      if(!node) return false;
      if(node.value === val) return true;
      return val < node.value ? has(node.left) : has(node.right);
    })(st.tree);

    if(!existed){
      st.lastFound = [];
      dsNarrate(`${val}은 트리에 없어 삭제할 수 없습니다`);
      return;
    }

    st.tree = removeNode(st.tree, val);
    st.lastFound = [];
    dsNarrate(`${val}을 트리에서 삭제했습니다`);
  }

  // ---- 렌더링 ----

  function renderDsQueue(){

  function renderDsList(){
    const view = document.getElementById("dsView");
    view.innerHTML = "";
    const st = dsState.linkedlist;

      view.innerHTML = `<span class="ds-empty">리스트가 비어 있습니다</span>`;

  function renderDsTree(){
    const view = document.getElementById("dsView");
    view.innerHTML = "";
    const st = dsState.tree;
    if(st.tree === null){
      view.innerHTML = `<span class="ds-empty">트리가 비어 있습니다</span>`;
      return;
    }
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("class", "ds-tree-svg");
    svg.setAttribute("viewBox", "0 0 800 280");
    svg.setAttribute("preserveAspectRatio", "xMidYMin meet");

    const lineColor = getCss("--line");
    const nodeColor = getCss("--ink-soft");
    const highlightColor = getCss("--compare");
    const textColor = getCss("--paper");

    function layout(node, depth, xMin, xMax, positions){
      if(!node) return;
      const x = (xMin + xMax) / 2;
      const y = 30 + depth * 60;
      positions.push({ node, x, y });
      layout(node.left, depth+1, xMin, x, positions);
      layout(node.right, depth+1, x, xMax, positions);
    }
    const positions = [];
    layout(st.tree, 0, 20, 780, positions);

    // 엣지 먼저
    positions.forEach(p => {
      if(p.node.left){
        const childPos = positions.find(q => q.node === p.node.left);
        if(childPos){
          const line = document.createElementNS(svgNS, "line");
          line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
          line.setAttribute("x2", childPos.x); line.setAttribute("y2", childPos.y);
          line.setAttribute("stroke", lineColor);
          line.setAttribute("stroke-width", "1.5");
          svg.appendChild(line);
        }
      }
      if(p.node.right){
        const childPos = positions.find(q => q.node === p.node.right);
        if(childPos){
          const line = document.createElementNS(svgNS, "line");
          line.setAttribute("x1", p.x); line.setAttribute("y1", p.y);
          line.setAttribute("x2", childPos.x); line.setAttribute("y2", childPos.y);
          line.setAttribute("stroke", lineColor);
          line.setAttribute("stroke-width", "1.5");
          svg.appendChild(line);
        }
      }
    });

    // 노드
    positions.forEach(p => {
      const isHighlighted = st.lastFound && st.lastFound.includes(p.node.value);
      const circle = document.createElementNS(svgNS, "circle");
      circle.setAttribute("cx", p.x); circle.setAttribute("cy", p.y); circle.setAttribute("r", "17");
      circle.setAttribute("fill", isHighlighted ? highlightColor : nodeColor);
      svg.appendChild(circle);

      const text = document.createElementNS(svgNS, "text");
      text.setAttribute("x", p.x); text.setAttribute("y", p.y);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("dominant-baseline", "middle");
      text.setAttribute("fill", textColor);
      text.setAttribute("font-family", "IBM Plex Mono, monospace");
      text.setAttribute("font-size", "13");
      text.setAttribute("font-weight", "600");
      text.textContent = p.node.value;
      svg.appendChild(text);
    });

    view.appendChild(svg);
  }

  function renderDsView(){
    const st = dsState[currentAlgo];
    document.getElementById("dsSize").textContent =
      currentAlgo === "stack" ? st.data.length :
      currentAlgo === "queue" ? st.data.length :
      currentAlgo === "linkedlist" ? st.data.length :
      countTreeNodes(st.tree);
    document.getElementById("dsOpCount").textContent = st.opCount;

    if(currentAlgo === "stack") renderDsStack();
    else if(currentAlgo === "queue") renderDsQueue();
    else if(currentAlgo === "linkedlist") renderDsList();
    else if(currentAlgo === "tree") renderDsTree();
  }

  function countTreeNodes(node){
    if(!node) return 0;
    return 1 + countTreeNodes(node.left) + countTreeNodes(node.right);
  }

  function renderDsControls(){
    const controlsEl = document.getElementById("dsControls");
    controlsEl.innerHTML = "";

    function makeInput(placeholder){
      const input = document.createElement("input");
      input.type = "number";
      input.placeholder = placeholder;
      return input;
    }
    function makeBtn(label, onClick){
      const btn = document.createElement("button");
      btn.className = "btn ghost";
      btn.textContent = label;
      btn.addEventListener("click", onClick);
      return btn;
    }

    if(currentAlgo === "stack"){
      const input = makeInput("값");
      controlsEl.appendChild(input);
      controlsEl.appendChild(makeBtn("push", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsPush(v); input.value=""; renderDsView();
      }));
      controlsEl.appendChild(makeBtn("pop", () => { dsPop(); renderDsView(); }));
    }
    else if(currentAlgo === "queue"){
      const input = makeInput("값");
      controlsEl.appendChild(input);
      controlsEl.appendChild(makeBtn("enqueue", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsEnqueue(v); input.value=""; renderDsView();
      }));
      controlsEl.appendChild(makeBtn("dequeue", () => { dsDequeue(); renderDsView(); }));
    }
    else if(currentAlgo === "linkedlist"){
      const input = makeInput("값");
      controlsEl.appendChild(input);
      controlsEl.appendChild(makeBtn("맨 뒤에 추가", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsListAddLast(v); input.value=""; renderDsView();
      }));
      controlsEl.appendChild(makeBtn("맨 앞에 추가", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsListAddFirst(v); input.value=""; renderDsView();
      }));
      controlsEl.appendChild(makeBtn("값으로 제거", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsListRemove(v); input.value=""; renderDsView();
      }));
    }
    else if(currentAlgo === "tree"){
      const input = makeInput("값");
      controlsEl.appendChild(input);
      controlsEl.appendChild(makeBtn("추가", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsTreeInsert(v); input.value=""; renderDsView();
      }));
      controlsEl.appendChild(makeBtn("찾기", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsTreeFind(v); input.value=""; renderDsView();
      }));
      controlsEl.appendChild(makeBtn("삭제", () => {
        const v = Number(input.value);
        if(Number.isNaN(v) || input.value.trim()==="") { dsNarrate("숫자를 입력해주세요"); return; }
        dsTreeDelete(v); input.value=""; renderDsView();
      }));
    }
  }

  function dsResetToExample(kind){
    const st = dsState[kind];
    if(kind === "stack") st.data = [5, 2, 8];
    else if(kind === "queue") st.data = [3, 7, 1];
    else if(kind === "linkedlist") st.data = [4, 9, 2, 6];
    else if(kind === "tree"){
      st.tree = null;
      st.lastFound = null;
      [8, 3, 10, 1, 6, 14, 4].forEach(v => dsTreeInsertInto(st, v, true));
    }
    st.opCount = 0;
    st.highlightIdx = null;
  }

  function rebuildDs(algo){
    currentAlgo = algo;
    dsEnsureInitialized(algo);
    renderDsControls();
    renderDsView();
    renderExplain(algo);
    dsNarrate("아래에서 동작을 선택해 실행해보세요.");
  }

  // ===================================================================
  // 정렬 렌더링
  // ===================================================================
  function renderBars(){
    barsEl.innerHTML = "";
    const max = Math.max(...array, 1);
    array.forEach((val, idx) => {
      const bar = document.createElement("div");
      bar.className = "bar";
      bar.dataset.idx = idx;
      const valEl = document.createElement("div");
      valEl.className = "bar-val";
      valEl.textContent = val;
      const fill = document.createElement("div");
      fill.className = "bar-fill";
      fill.style.height = (val/max*100) + "%";
      bar.appendChild(valEl);
      bar.appendChild(fill);
      barsEl.appendChild(bar);
    });
  }

  function applySortStep(step){
    array = step.array;
    const bars = barsEl.children;
    if(bars.length !== array.length) renderBars();
    const max = Math.max(...array, 1);
    for(let i=0;i<array.length;i++){
      const bar = bars[i];
      if(!bar) continue;
      bar.className = "bar";
      const fill = bar.querySelector(".bar-fill");
      const valEl = bar.querySelector(".bar-val");
      fill.style.height = (array[i]/max*100) + "%";
      valEl.textContent = array[i];
      if(step.doneIdx && step.doneIdx.includes(i)) bar.classList.add("done");
      if(step.compareIdx && step.compareIdx.includes(i)) bar.classList.add("compare");
      if(step.swapIdx && step.swapIdx.includes(i)) bar.classList.add("swap");
    }
    metaCompareEl.textContent = step.compareCount;
    metaSwapEl.textContent = step.swapCount;
    const theo = complexityFormula[currentAlgo].calc(array.length);
    metaComplexityEl.textContent = `${step.compareCount} / ${theo} (${complexityFormula[currentAlgo].label})`;
  }

  // ===================================================================
  // 그래프 렌더링
  // ===================================================================
  let cssCache = {};
  function getCss(varName){
    if(cssCache[varName]) return cssCache[varName];
    const val = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    cssCache[varName] = val;
    return val;
  }

  function nodeColor(id, step){
    if(currentAlgo === "dijkstra"){
      if(step.finalSet && step.finalSet.includes(id)) return getCss("--done");
      if(step.currentNode === id) return getCss("--compare");
      if(step.dist && step.dist[id] !== Infinity) return getCss("--frontier");
      return getCss("--ink-soft");
    }
    if(step.currentNode === id) return getCss("--compare");
    if(step.visitedSet && step.visitedSet.includes(id)) return getCss("--done");
    if(step.queue && step.queue.includes(id)) return getCss("--frontier");
    return getCss("--ink-soft");
  }

  function resizeCanvas(){
    if(category !== "graph") return;
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    drawGraph(steps[cur] || {});
  }

  function drawGraph(step){
    const rect = canvas.parentElement.getBoundingClientRect();
    const W = rect.width, H = rect.height;
    ctx.clearRect(0,0,W,H);
    const pad = 46;
    const toPx = (n) => ({ x: pad + n.x*(W-2*pad), y: pad + n.y*(H-2*pad) });

    edges.forEach(e => {
      const pa = toPx(nodes[e.a]);
      const pb = toPx(nodes[e.b]);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.strokeStyle = getCss("--line");
      ctx.lineWidth = 1.5;
      ctx.stroke();
      if(currentAlgo === "dijkstra"){
        const mx = (pa.x+pb.x)/2, my = (pa.y+pb.y)/2;
        ctx.font = "11px 'IBM Plex Mono', monospace";
        const txt = String(e.weight);
        const tw = ctx.measureText(txt).width;
        ctx.fillStyle = getCss("--paper-deep");
        ctx.fillRect(mx-tw/2-3, my-8, tw+6, 16);
        ctx.fillStyle = getCss("--ink-soft");
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(txt, mx, my);
      }
    });

    const R = 17;
    nodes.forEach(n => {
      const p = toPx(n);
      ctx.beginPath();
      ctx.arc(p.x, p.y, R, 0, Math.PI*2);
      ctx.fillStyle = nodeColor(n.id, step);
      ctx.fill();
      if(step.currentNode === n.id){
        ctx.lineWidth = 3;
        ctx.strokeStyle = getCss("--ink");
        ctx.stroke();
      }
      ctx.fillStyle = getCss("--paper");
      ctx.font = "600 13px 'IBM Plex Mono', monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(n.id, p.x, p.y);
      if(currentAlgo === "dijkstra" && step.dist){
        const d = step.dist[n.id];
        const label = d === Infinity ? "∞" : String(d);
        ctx.font = "600 11px 'IBM Plex Mono', monospace";
        ctx.fillStyle = getCss("--ink");
        ctx.fillText(label, p.x, p.y - R - 11);
      }
    });
  }

  function renderQueuePanel(step){
    if(currentAlgo === "dijkstra"){ queuePanelEl.style.display = "none"; return; }
    queuePanelEl.style.display = "flex";
    queueLabelEl.textContent = currentAlgo === "bfs" ? "큐 (앞→뒤)" : "스택 (위→아래)";
    queueItemsEl.innerHTML = "";
    const list = step.queue || [];
    list.forEach((id, idx) => {
      const chip = document.createElement("span");
      chip.className = "queue-chip" + (idx===0 ? " head" : "");
      chip.textContent = id;
      queueItemsEl.appendChild(chip);
    });
    if(list.length === 0){
      const chip = document.createElement("span");
      chip.className = "queue-chip";
      chip.textContent = "비어있음";
      queueItemsEl.appendChild(chip);
    }
  }

  function renderDistPanel(step){
    if(currentAlgo !== "dijkstra"){ distPanelEl.style.display = "none"; return; }
    distPanelEl.style.display = "flex";
    distPanelEl.innerHTML = "";
    if(!step.dist) return;
    step.dist.forEach((d, id) => {
      const chip = document.createElement("span");
      let cls = "dist-chip";
      if(step.finalSet && step.finalSet.includes(id)) cls += " final";
      else if(step.currentNode === id) cls += " updated";
      chip.className = cls;
      chip.innerHTML = `노드${id}<b>${d===Infinity?"∞":d}</b>`;
      distPanelEl.appendChild(chip);
    });
  }

  function applyGraphStep(step){
    drawGraph(step);
    renderQueuePanel(step);
    renderDistPanel(step);
    metaVisitedEl.textContent = step.visitedCount;
    metaEdgesEl.textContent = step.edgeCount;
    metaGraphComplexityEl.textContent = graphComplexityLabel[currentAlgo] || "—";
  }

  // ===================================================================
  // 설명 박스
  // ===================================================================
  function renderExplain(algo){
    const data = explainData[algo];
    if(!data) return;
    explainTitleEl.textContent = data.title;
    explainBodyEl.textContent = explainMode === "simple" ? data.simple : data.detail;
    if(explainMode === "detail"){
      const structOrStable = data.structure
        ? `<li>자료구조<b>${data.structure}</b></li>`
        : `<li>안정성<b>${data.stable}</b></li>`;
      explainMetaEl.innerHTML = `
        <li>시간복잡도<b>${data.time}</b></li>
        <li>공간복잡도<b>${data.space}</b></li>
        ${structOrStable}
        <li>특징<b>${data.trait}</b></li>
      `;
    } else {
      explainMetaEl.innerHTML = "";
    }
  }

  // ===================================================================
  // 공통 재생 엔진
  // ===================================================================
  function applyStep(step){
    if(category === "sort") applySortStep(step);
    else applyGraphStep(step);

    narrationEl.innerHTML = step.note ? `<b>${cur+1}.</b> ${step.note}` : "";
    scrubEl.value = cur;
    stepLabelEl.textContent = `${cur+1} / ${steps.length}`;
    btnPrev.disabled = cur<=0;
    btnNext.disabled = cur>=steps.length-1;
  }

  function goTo(idx){
    cur = Math.max(0, Math.min(steps.length-1, idx));
    applyStep(steps[cur]);
    if(cur>=steps.length-1) stopPlay();
  }

  function stepForward(){
    if(cur < steps.length-1) goTo(cur+1);
    else stopPlay();
  }

  function startPlay(){
    if(steps.length===0 || cur>=steps.length-1) return;
    playing = true;
    btnPlay.textContent = "일시정지";
    const tick = () => {
      stepForward();
      if(playing && cur<steps.length-1){
        const speedVal = Number(speedEl.value);
        const delay = 650 - speedVal*55;
        timer = setTimeout(tick, Math.max(45, delay));
      } else {
        stopPlay();
      }
    };
    tick();
  }

  function stopPlay(){
    playing = false;
    btnPlay.textContent = "재생";
    if(timer) clearTimeout(timer);
  }

  // ===================================================================
  // 카테고리 / 알고리즘 전환
  // ===================================================================
  function renderAlgoTabs(){
    algoTabsEl.innerHTML = "";
    algoList[category].forEach((a, idx) => {
      const btn = document.createElement("button");
      btn.className = "algo-tab" + (idx===0 ? " active" : "");
      btn.dataset.algo = a.key;
      btn.textContent = a.label;
      btn.addEventListener("click", () => {
        algoTabsEl.querySelectorAll(".algo-tab").forEach(t=>t.classList.remove("active"));
        btn.classList.add("active");
        if(category === "ds") rebuildDs(a.key);
        else rebuild(a.key);
      });
      algoTabsEl.appendChild(btn);
    });
  }

  function switchCategory(cat){
    category = cat;
    document.querySelectorAll(".category-tab").forEach(t=>{
      t.classList.toggle("active", t.dataset.category === cat);
    });

    const mainStageEl = document.getElementById("mainStage");
    const dsStageEl = document.getElementById("dsStage");

    if(cat === "sort"){
      pageTitleEl.textContent = "정렬 알고리즘 시각화";
      mainStageEl.style.display = "block";
      dsStageEl.style.display = "none";
      barsEl.style.display = "flex";
      graphAreaEl.style.display = "none";
      metaRowSortEl.style.display = "flex";
      metaRowGraphEl.style.display = "none";
      sizeLabelEl.textContent = "배열 크기";
      sizeInputEl.min = 5; sizeInputEl.max = 40; sizeInputEl.value = 20;
      currentAlgo = "bubble";
      customInputRowEl.style.display = "flex";
    } else if(cat === "graph"){
      pageTitleEl.textContent = "그래프 탐색 알고리즘 시각화";
      mainStageEl.style.display = "block";
      dsStageEl.style.display = "none";
      barsEl.style.display = "none";
      graphAreaEl.style.display = "block";
      metaRowSortEl.style.display = "none";
      metaRowGraphEl.style.display = "flex";
      sizeLabelEl.textContent = "노드 개수";
      sizeInputEl.min = 5; sizeInputEl.max = 14; sizeInputEl.value = 9;
      currentAlgo = "bfs";
      customInputRowEl.style.display = "none";
    } else {
      pageTitleEl.textContent = "자료구조 시각화";
      mainStageEl.style.display = "none";
      dsStageEl.style.display = "block";
      currentAlgo = "stack";
    }

    renderAlgoTabs();

    if(cat === "sort"){
      array = genArray(Number(sizeInputEl.value));
      rebuild(currentAlgo);
    } else if(cat === "graph"){
      const g = genGraph(Number(sizeInputEl.value));
      nodes = g.nodes; edges = g.edges; adj = g.adj;
      startNode = 0;
      rebuild(currentAlgo);
      resizeCanvas();
    } else {
      rebuildDs(currentAlgo);
    }
  }

  function rebuild(algo){
    currentAlgo = algo;
    stopPlay();
    if(category === "sort"){
      steps = buildSortSteps(algo, array);
    } else {
      steps = buildGraphSteps(algo, startNode);
    }
    cur = 0;
    scrubEl.max = steps.length-1;
    renderBars_or_draw();
    applyStep(steps[0]);
    renderExplain(algo);
  }

  function renderBars_or_draw(){
    if(category === "sort"){
      renderBars();
    }
    // 그래프는 applyStep -> applyGraphStep -> drawGraph에서 처리됨
  }

  function regenerate(){
    if(category === "sort"){
      const n = Math.max(5, Math.min(40, Number(sizeInputEl.value) || 20));
      array = genArray(n);
      rebuild(currentAlgo);
      customInputErrorEl.textContent = "";
      customInputEl.value = "";
    } else {
      const n = Math.max(5, Math.min(14, Number(sizeInputEl.value) || 9));
      const g = genGraph(n);
      nodes = g.nodes; edges = g.edges; adj = g.adj;
      startNode = 0;
      rebuild(currentAlgo);
    }
  }

  function applyCustomArray(){
    const raw = customInputEl.value.trim();
    if(!raw){
      customInputErrorEl.textContent = "값을 입력해주세요.";
      return;
    }
    const parts = raw.split(",").map(s => s.trim()).filter(s => s.length > 0);
    const parsed = parts.map(s => Number(s));

    if(parsed.some(v => Number.isNaN(v))){
      customInputErrorEl.textContent = "숫자만 쉼표로 구분해서 입력해주세요.";
      return;
    }
    if(parsed.length < 2){
      customInputErrorEl.textContent = "값을 2개 이상 입력해주세요.";
      return;
    }
    if(parsed.length > 40){
      customInputErrorEl.textContent = "값은 최대 40개까지 입력할 수 있어요.";
      return;
    }
    if(parsed.some(v => v < 1 || v > 999 || !Number.isInteger(v))){
      customInputErrorEl.textContent = "각 값은 1~999 사이의 정수여야 해요.";
      return;
    }

    customInputErrorEl.textContent = "";
    array = parsed;
    sizeInputEl.value = parsed.length;
    rebuild(currentAlgo);
  }

  // ===================================================================
  // 이벤트
  // ===================================================================
  document.querySelectorAll(".category-tab").forEach(tab => {
    tab.addEventListener("click", () => switchCategory(tab.dataset.category));
  });

  document.querySelectorAll(".explain-toggle-btn[data-mode]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".explain-toggle-btn[data-mode]").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      explainMode = btn.dataset.mode;
      renderExplain(currentAlgo);
    });
  });

  btnPlay.addEventListener("click", () => playing ? stopPlay() : startPlay());
  btnPrev.addEventListener("click", () => { stopPlay(); goTo(cur-1); });
  btnNext.addEventListener("click", () => { stopPlay(); goTo(cur+1); });
  btnReset.addEventListener("click", () => { stopPlay(); goTo(0); });
  btnShuffle.addEventListener("click", regenerate);
  btnApplyCustom.addEventListener("click", applyCustomArray);
  customInputEl.addEventListener("keydown", (e) => {
    if(e.key === "Enter") applyCustomArray();
  });
  document.getElementById("btnDsReset").addEventListener("click", () => {
    dsResetToExample(currentAlgo);
    renderDsView();
    dsNarrate("예시 데이터로 초기화했습니다.");
  });
  scrubEl.addEventListener("input", (e) => { stopPlay(); goTo(Number(e.target.value)); });

  canvas.addEventListener("click", (e) => {
    if(category !== "graph") return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left);
    const y = (e.clientY - rect.top);
    const pad = 46;
    const W = rect.width, H = rect.height;
    let clickedId = null;
    nodes.forEach(n => {
      const px = pad + n.x*(W-2*pad);
      const py = pad + n.y*(H-2*pad);
      if(Math.hypot(px-x, py-y) <= 17){ clickedId = n.id; }
    });
    if(clickedId !== null && clickedId !== startNode){
      startNode = clickedId;
      rebuild(currentAlgo);
    }
  });

  document.addEventListener("keydown", (e) => {
    if(e.target.tagName === "INPUT") return;
    if(e.code === "Space"){ e.preventDefault(); playing ? stopPlay() : startPlay(); }
    if(e.code === "ArrowRight"){ stopPlay(); goTo(cur+1); }
    if(e.code === "ArrowLeft"){ stopPlay(); goTo(cur-1); }
  });

  window.addEventListener("resize", resizeCanvas);

  // ===================================================================
  // 초기화
  // ===================================================================
  renderAlgoTabs();
  array = genArray(20);
  rebuild("bubble");
})();
</script>
</body>
</html>
